      '<div class="card">' +
      '<button type="button" class="btn btn-primary btn-block" id="btnExport">Export backup (JSON)</button>' +
      '<button type="button" class="btn btn-secondary btn-block" id="btnImport">Import backup (JSON)</button>' +
      '<button type="button" class="btn btn-secondary btn-block" id="btnReset" style="margin-top:16px;color:#b91c1c;border-color:#fecaca">Reset all data</button>' +
      "</div>";

    document.getElementById("btnExport").onclick = function () {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      const d = new Date();
      const stamp = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
      a.download = "habit-journal-backup-" + stamp + ".json";
      a.click();
      URL.revokeObjectURL(a.href);
      try {
        localStorage.setItem("habit-journal-last-export", String(Date.now()));
      } catch (e) { /* ok */ }
      toast("Backup saved — keep the file somewhere safe");
    };

    document.getElementById("btnImport").onclick = function () {
      document.getElementById("importInput").click();
    };

    document.getElementById("btnReset").onclick = function () {
      if (!confirm("Erase all habits and marks? This cannot be undone.")) return;
      if (!confirm("Really delete everything? Export first if you want a backup.")) return;
      clearAllStorage();
      state = defaultState();
      save();
      render();
      toast("Reset complete");
    };
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function applyImportedState(p, replace) {
    var merged;
    if (replace) {
      merged = {
        version: 2,
        year: typeof p.year === "number" ? p.year : new Date().getFullYear(),
        month: typeof p.month === "number" ? p.month : new Date().getMonth(),
        habits: p.habits,
        cells: p.cells || {},
        categories: Array.isArray(p.categories) && p.categories.length ? p.categories : cloneDefaultCategories(),
        categoryFilter: typeof p.categoryFilter === "string" ? p.categoryFilter : "all",
        migratedStepsDefault: !!p.migratedStepsDefault,
      };
    } else if (typeof AppsBackup !== "undefined" && AppsBackup.APP_REGISTRY["habit-journal"] && AppsBackup.APP_REGISTRY["habit-journal"].mergeSlice) {
      merged = AppsBackup.APP_REGISTRY["habit-journal"].mergeSlice(state, p);
      merged.migratedStepsDefault = state.migratedStepsDefault || !!p.migratedStepsDefault;
    } else {
      var habitIds = {};
      state.habits.forEach(function (h) { habitIds[h.id] = true; });
      merged = {
        version: 2,
        year: state.year,
        month: state.month,
        habits: state.habits.slice(),
        cells: Object.assign({}, state.cells),
        categories: state.categories.slice(),
        categoryFilter: state.categoryFilter,
        migratedStepsDefault: state.migratedStepsDefault,
      };
      (p.habits || []).forEach(function (h) {
        if (!habitIds[h.id]) merged.habits.push(h);
      });
      Object.keys(p.cells || {}).forEach(function (k) {
        if (!merged.cells[k]) merged.cells[k] = p.cells[k];
      });
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
    state = loadState();
    save();
    render();
    toast(replace ? "History replaced" : "Data added");
  }

  function closeImportSheet() {
    document.getElementById("importSheet").hidden = true;
    document.body.classList.remove("import-open");
    pendingImport = null;
  }

  function openImportSheet(summary) {
    document.getElementById("importSheetSummary").textContent = summary;
    document.getElementById("importSheet").hidden = false;
    document.body.classList.add("import-open");
  }

  document.getElementById("importAddBtn").addEventListener("click", function () {
    if (!pendingImport) return;
    applyImportedState(pendingImport, false);
    closeImportSheet();
  });

  document.getElementById("importReplaceBtn").addEventListener("click", function () {
    if (!pendingImport) return;
    if (!confirm("Replace all habits and marks with this file? This cannot be undone.")) return;
    applyImportedState(pendingImport, true);
    closeImportSheet();
  });

  document.getElementById("importCancelBtn").addEventListener("click", closeImportSheet);
  document.getElementById("importBackdrop").addEventListener("click", closeImportSheet);

  document.getElementById("importInput").addEventListener("change", function (e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function () {
      try {
        let p = JSON.parse(reader.result);
        if (typeof AppsBackup !== "undefined" && AppsBackup.isUnifiedBackup(p)) {
          p = AppsBackup.getAppSlice(p, "habit-journal");
          if (!p) {
            toast("No Habit Journal data in this file");
            return;
          }
        }
        if (!p || !Array.isArray(p.habits)) throw new Error("Invalid");
        pendingImport = p;
        var habitCount = p.habits.length;
        var markCount = Object.keys(p.cells || {}).length;
        openImportSheet(
          "This file has " + habitCount + " habit" + (habitCount === 1 ? "" : "s") +
          " and " + markCount + " marked day" + (markCount === 1 ? "" : "s") +
          ". Add to your existing data, or replace your full history?"
        );
      } catch (err) {
        toast("Invalid JSON file");
      }
    };
    reader.readAsText(file);
  });

  const panelIds = { month: "panelMonth", year: "panelYear", habits: "panelHabits", data: "panelData" };

  document.addEventListener("click", function (e) {
    const btn = e.target.closest("[data-mode-action]");
    if (!btn) return;
    setEraserMode(btn.getAttribute("data-mode-action") === "eraser");
    render();
  });

  document.getElementById("yearFsClose").addEventListener("click", closeYearFullscreen);
  document.getElementById("yearFullscreen").addEventListener("click", function (e) {
    if (e.target.id === "yearFullscreen") closeYearFullscreen();
  });

  document.getElementById("habitEditClose").addEventListener("click", closeHabitEdit);
  document.getElementById("habitEditBackdrop").addEventListener("click", closeHabitEdit);
  document.getElementById("habitEditSave").addEventListener("click", saveHabitEdit);
  document.getElementById("habitEditHide").addEventListener("click", function () {
    if (!habitEditId) return;
    const habit = state.habits.find(function (h) { return h.id === habitEditId; });
    if (!habit) return;
    const nextHidden = !habit.hidden;
    setHabitHidden(habitEditId, nextHidden);
    const hideBtn = document.getElementById("habitEditHide");
    if (hideBtn) {
      hideBtn.classList.toggle("on", nextHidden);
      hideBtn.setAttribute("aria-pressed", String(nextHidden));
      hideBtn.textContent = renderHabitHideBtnLabel(nextHidden, true);
    }
  });
  document.getElementById("habitEditName").addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      saveHabitEdit();
    }
  });

  document.querySelectorAll(".tab").forEach(function (tab) {
    tab.onclick = function () {
      if (tab.dataset.tab !== "year") closeYearFullscreen();
      closeHabitEdit();
      activeTab = tab.dataset.tab;
      document.querySelectorAll(".tab").forEach(function (t) { t.classList.toggle("on", t === tab); });
      document.querySelectorAll(".panel").forEach(function (p) { p.classList.remove("on"); });
      document.getElementById(panelIds[activeTab]).classList.add("on");
      render();
    };
  });

  function render() {
    try {
      ensureHabitsReady();
      document.body.classList.toggle("eraser-mode", eraserMode && (activeTab === "month" || activeTab === "year"));
      updateModeBar();
      renderTopNav();
      if (activeTab === "month") renderMonth();
      else if (activeTab === "year") {
        renderYear();
        if (yearFullscreenHabitId) {
          openYearFullscreen(yearFullscreenHabitId);
        }
      }
      else if (activeTab === "habits") renderHabits();
      else if (activeTab === "data") renderData();
    } catch (err) {
      console.error("Habit Journal render error:", err);
      showFatalError("Could not display habits. Open the Data tab, tap Reset, then reload. If it persists, clear Safari website data for mathoose.github.io.");
    }
  }

  storageOk = storageAvailable();
  if (!storageOk) {
    showStorageBanner("Data won't save in Private Browsing. Use Safari normal mode and always open the same URL (mathoose.github.io).");
  } else if ("storage" in navigator && navigator.storage && navigator.storage.persist) {
    navigator.storage.persist().catch(function () {});
  }

  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "hidden") flushSave();
  });
  window.addEventListener("pagehide", flushSave);

  try {
    render();
    if (window.__hjRecoveredFrom) {
      toast("Restored your data from automatic backup");
      window.__hjRecoveredFrom = null;
    }
    if (storageOk && Object.keys(state.cells).length > 0) {
      try {
        const lastExport = parseInt(localStorage.getItem("habit-journal-last-export"), 10);
        const lastTip = parseInt(localStorage.getItem("habit-journal-export-tip"), 10);
        if ((!lastExport || Date.now() - lastExport > 14 * 86400000) && (!lastTip || Date.now() - lastTip > 7 * 86400000)) {
          localStorage.setItem("habit-journal-export-tip", String(Date.now()));
          setTimeout(function () {
            toast("Tip: Data tab → Export backup for an extra copy");
          }, 1200);
        }
      } catch (e) { /* ok */ }
    }
  } catch (err) {
    console.error("Habit Journal startup error:", err);
    showFatalError("Could not start Habit Journal. Open the Data tab, tap Reset, then reload the page.");
  }
})();
  </script>
  <script src="../apps-backup.js"></script>
  <script src="../apps-shell.js" defer></script>
</body>
</html>
