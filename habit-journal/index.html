<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Habit Journal" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#5c4d3c" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <!-- build: hj-year-gallery-v6 -->
  <link rel="icon" href="app-icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="app-icon.png" />
  <link rel="stylesheet" href="../apps-shell.css" />
  <title>Habit Journal</title>
  <style>
    :root {
      --paper: #faf8f5;
      --dot: #e8e2d9;
      --ink: #2c2419;
      --muted: #7a6f62;
      --accent: #c45c5c;
      --accent-dark: #a84a4a;
      --border: #ddd5c8;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tap: 44px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; height: -webkit-fill-available; }
    body {
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      color: var(--ink);
      background-color: var(--paper);
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 18px 18px;
      padding-top: calc(60px + var(--safe-top));
      padding-bottom: calc(64px + var(--safe-bottom));
      overscroll-behavior: none;
    }
    body.has-mode-bar {
      padding-bottom: calc(128px + var(--safe-bottom));
    }
    button, .cell, .tab, .nav-btn { touch-action: manipulation; }
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: calc(8px + var(--safe-top)) 12px 8px;
      background: rgba(250, 248, 245, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar h1 {
      flex: 1;
      min-width: 0;
      font-size: 1.0625rem;
      font-weight: 700;
      font-family: Georgia, "Times New Roman", serif;
    }
    .habit-journal .apps-home-back {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--ink);
    }
    .nav-row { display: flex; align-items: center; gap: 6px; }
    .nav-btn {
      min-width: var(--tap);
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
    }
    .nav-btn:active { background: #f5f0e8; }
    .nav-btn.eraser-btn {
      padding: 0 8px;
      color: var(--muted);
    }
    .nav-btn.eraser-btn.on {
      background: var(--accent);
      border-color: var(--accent-dark);
      color: #fff;
    }
    .nav-btn.eraser-btn svg { display: block; }
    body.eraser-mode .month-grid .cell:not(.invalid):not(:disabled),
    body.eraser-mode .year-fs-cells .cell:not(.invalid):not(:disabled) {
      box-shadow: inset 0 0 0 1px rgba(196, 92, 92, 0.35);
    }
    .nav-label { font-size: 0.9375rem; font-weight: 600; min-width: 100px; text-align: center; }
    main { max-width: 520px; margin: 0 auto; padding: 12px 10px 16px; }
    .panel { display: none; }
    .panel.on { display: block; }
    #panelYear { padding-bottom: 8px; }
    .card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(44, 36, 25, 0.06);
    }
    .card h2 {
      font-size: 1rem;
      font-family: Georgia, serif;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .habit-tag {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent);
    }
    .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -4px; padding: 4px; }
    .month-grid {
      display: grid;
      gap: 3px;
      min-width: min-content;
    }
    .month-grid .corner {
      width: 108px;
      min-width: 108px;
      position: sticky;
      left: 0;
      z-index: 4;
      background: rgba(255, 255, 255, 0.96);
    }
    .month-grid .day-head {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      font-weight: 700;
      text-align: center;
      padding: 3px 0;
      min-width: 28px;
    }
    .month-grid .day-head .day-num {
      font-size: 0.625rem;
      color: var(--ink);
      line-height: 1.1;
    }
    .month-grid .day-head .day-dow {
      font-size: 0.5rem;
      font-weight: 600;
      color: var(--muted);
      line-height: 1;
      letter-spacing: 0.02em;
    }
    .month-grid .day-head.is-today .day-num,
    .month-grid .day-head.is-today .day-dow {
      color: var(--accent);
      font-weight: 800;
    }
    .month-grid .day-head.is-today {
      background: rgba(196, 92, 92, 0.1);
      border-radius: 6px;
    }
    .month-grid .habit-label {
      font-size: 0.625rem;
      font-weight: 600;
      padding: 4px 3px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      line-height: 1.15;
      min-height: 32px;
      position: sticky;
      left: 0;
      z-index: 3;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 4px 0 8px rgba(44, 36, 25, 0.06);
      max-width: 108px;
      min-width: 108px;
    }
    .habit-label-row {
      display: flex;
      gap: 3px;
      align-items: flex-start;
      width: 100%;
    }
    .habit-label-text {
      flex: 1;
      min-width: 0;
    }
    .habit-label-edit {
      border: none;
      background: transparent;
      padding: 2px 0;
      font: inherit;
      color: inherit;
      text-align: left;
      cursor: pointer;
      border-radius: 4px;
      width: 100%;
    }
    .habit-label-edit:active {
      background: rgba(196, 92, 92, 0.08);
    }
    .habit-sort-btns {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex-shrink: 0;
    }
    .habit-sort-btn {
      width: 20px;
      height: 14px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: #fff;
      font-size: 0.4375rem;
      line-height: 1;
      color: var(--muted);
      cursor: pointer;
    }
    .habit-sort-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .habit-sort-btn:not(:disabled):active {
      background: #f5f0e8;
    }
    .habit-label-step {
      font-size: 0.5625rem;
      font-weight: 700;
      color: var(--muted);
      margin-top: 2px;
    }
    .habit-label-streak {
      display: block;
      font-size: 0.5625rem;
      font-weight: 700;
      color: var(--accent);
      margin-top: 2px;
    }
    .month-grid .cell.col-today {
      box-shadow: inset 0 0 0 2px var(--accent);
    }
    .month-grid .cell {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: #fff;
      cursor: pointer;
      padding: 0;
      transition: transform 0.1s;
    }
    .month-grid .cell:active { transform: scale(0.92); }
    .month-grid .cell.cell-count {
      border-radius: 8px;
      font-size: 0.5625rem;
      font-weight: 700;
      color: #3d2c2c;
    }
    .year-grid .cell.cell-count { font-size: 0.5rem; }
    .month-grid .cell.cell-yes { font-size: 0.75rem; font-weight: 700; }
    .habit-settings { margin-top: 10px; }
    .type-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .type-pill {
      flex: 1;
      height: 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
    }
    .type-pill.on {
      border-color: var(--accent);
      background: #fdeaea;
      color: var(--accent-dark);
    }
    .exclude-days-row {
      margin-top: 10px;
    }
    .exclude-days-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .exclude-day-chips {
      display: flex;
      gap: 6px;
    }
    .exclude-day-chip {
      flex: 1;
      min-width: 0;
      height: 36px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
    }
    .exclude-day-chip.on {
      background: #d8d4cc;
      border-color: #b8b4ac;
      color: #6b6560;
    }
    .exclude-days-hint {
      margin: 6px 0 0;
      font-size: 0.6875rem;
    }
    .month-grid .cell.cell-blocked {
      background: #d8d4cc !important;
      border-color: #c8c4bc !important;
      cursor: default;
      opacity: 0.85;
    }
    .month-grid .cell.cell-blocked:active { transform: none; }
    .month-grid .cell.cell-progress {
      background: #f5d76e;
      border-color: #e6c65c;
      color: #6b5a18;
      font-size: 0.6875rem;
      font-weight: 700;
    }
    .month-grid .cell.cell-no { color: var(--accent-dark); }
    .step-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
    }
    .step-row input {
      width: 72px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-align: center;
      font-size: 1rem;
    }
    .legend-scale {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      margin-top: 8px;
    }
    .legend-scale .legend-swatch {
      width: 22px;
      height: 22px;
      border-radius: 4px;
    }
    .legend-scale span {
      font-size: 0.5625rem;
      color: var(--muted);
      text-align: center;
      min-width: 22px;
    }
    .month-grid .cell.invalid {
      opacity: 0.25;
      pointer-events: none;
      background: transparent;
      border-color: transparent;
    }
    .year-block { margin-bottom: 20px; }
    .year-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .year-toolbar .btn { min-height: 40px; padding: 0 14px; font-size: 0.8125rem; }
    .year-toolbar-hint {
      font-size: 0.75rem;
      color: var(--muted);
      flex: 1 1 100%;
    }
    .category-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 2px 0;
    }
    .category-filters::-webkit-scrollbar { display: none; }
    .category-filters .chip {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
    }
    .category-filters .chip.on {
      border-color: var(--accent);
      background: #fdeaea;
      color: var(--accent-dark);
    }
    .year-toolbar .btn[aria-pressed="true"] {
      border-color: var(--accent);
      background: #fdeaea;
      color: var(--accent-dark);
    }
    /* YEAR COLLAPSED (3-across name chips): approved layout — ask user before changing. */
    .year-collapsed-grid.year-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      width: 100%;
      align-items: start;
    }
    .year-gallery {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .year-expanded-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -4px;
      padding: 4px;
      width: 100%;
      container-type: inline-size;
    }
    .year-expanded-scroll .year-expanded-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      width: max-content;
      min-width: 100%;
      justify-content: flex-start;
      align-items: flex-start;
    }
    .year-expanded-scroll .year-expanded-row[data-expanded-count="1"],
    .year-expanded-scroll .year-expanded-row[data-expanded-count="2"],
    .year-expanded-scroll .year-expanded-row[data-expanded-count="3"] {
      justify-content: center;
    }
    .year-expanded-scroll .year-grid-card.is-expanded {
      flex: 0 0 calc((100cqw - 12px) / 3);
      max-width: calc((100cqw - 12px) / 3);
      width: calc((100cqw - 12px) / 3);
    }
    .year-grid-card {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 1px 4px rgba(44, 36, 25, 0.05);
    }
    .year-grid-card.is-collapsed { padding: 0; }
    .year-grid-card.is-expanded {
      overflow: hidden;
      padding: 3px 2px 4px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      align-self: flex-start;
      height: auto;
    }
    .year-grid-card-head {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      min-height: 40px;
      padding: 8px 6px;
      border: none;
      background: transparent;
      cursor: pointer;
      text-align: left;
      font: inherit;
      color: var(--ink);
    }
    .year-grid-card.pin .year-grid-card-title::before {
      content: "★ ";
      color: var(--accent);
    }
    .year-grid-card.is-collapsed .year-grid-card-title {
      flex: 1;
      font-size: 0.6875rem;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .year-grid-card.is-expanded .year-grid-card-title {
      font-size: 0.5625rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .year-grid-card.is-collapsed .year-caret { transform: none; }
    .year-grid-card-open-fs {
      display: flex;
      flex-direction: column;
      flex: 0 0 auto;
      width: 100%;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      text-align: left;
    }
    .year-grid-card .year-grid-heatmap { pointer-events: none; }
    .habits-cat-bar { margin-bottom: 12px; }
    .habits-cat-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      font-size: 0.9375rem;
      font-weight: 700;
      font-family: Georgia, serif;
      cursor: pointer;
      color: var(--ink);
    }
    .habits-cat-toggle .habits-caret,
    .year-caret {
      font-size: 0.6875rem;
      color: var(--muted);
      transition: transform 0.15s ease;
      flex-shrink: 0;
    }
    .habits-cat-bar.is-open .habits-cat-toggle .habits-caret,
    .habits-cat-bar.is-open .habits-cat-toggle .year-caret { transform: rotate(90deg); }
    .habits-cat-panel {
      display: none;
      margin-top: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
    }
    .habits-cat-bar.is-open + .habits-cat-panel { display: block; }
    .habit-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .habit-cat-select {
      flex: 1;
      min-width: 120px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 10px;
      font-size: 0.875rem;
      background: #fff;
    }
    .habit-pin-btn {
      min-height: 40px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
    }
    .habit-pin-btn.on {
      border-color: #f59e0b;
      background: #fffbeb;
      color: #b45309;
    }
    .habit-hide-btn {
      min-height: 40px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
    }
    .habit-hide-btn.on {
      border-color: var(--muted);
      background: #f3f4f6;
      color: var(--muted);
    }
    .habit-card.is-hidden {
      opacity: 0.72;
    }
    .habits-hidden-section {
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px dashed var(--border);
    }
    .habits-hidden-heading {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--muted);
      margin: 0 0 10px;
    }
    .add-habit-row select {
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 10px;
      font-size: 0.875rem;
      background: #fff;
      min-width: 100px;
    }
    .year-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 200;
      height: 100dvh;
      max-height: 100dvh;
      background: var(--paper);
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 18px 18px;
      display: flex;
      flex-direction: column;
      padding: calc(6px + var(--safe-top)) 10px calc(8px + var(--safe-bottom));
    }
    .year-fullscreen[hidden] { display: none !important; }
    body.year-fs-open { overflow: hidden; }
    .habit-edit-sheet {
      position: fixed;
      inset: 0;
      z-index: 180;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .habit-edit-sheet[hidden] { display: none !important; }
    body.habit-edit-open { overflow: hidden; }
    .habit-edit-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(44, 36, 25, 0.35);
    }
    .habit-edit-panel {
      position: relative;
      width: 100%;
      max-width: 520px;
      background: var(--paper);
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 18px 18px;
      border-radius: 16px 16px 0 0;
      padding: 14px 14px calc(14px + var(--safe-bottom));
      border: 1px solid var(--border);
      box-shadow: 0 -8px 32px rgba(44, 36, 25, 0.12);
    }
    .habit-edit-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .habit-edit-head h2 {
      flex: 1;
      font-family: Georgia, serif;
      font-size: 1rem;
    }
    .habit-edit-close {
      min-width: 40px;
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font-size: 1.25rem;
      cursor: pointer;
    }
    .habit-edit-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 10px;
    }
    .habit-edit-field span {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .habit-edit-field input,
    .habit-edit-field select {
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 0.9375rem;
      background: #fff;
    }
    .habit-edit-field input[type="number"] {
      width: 120px;
    }
    .habit-edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .habit-edit-actions .btn {
      flex: 1;
      min-height: 44px;
    }
    .year-fs-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      flex-shrink: 0;
    }
    .year-fs-head h2 {
      flex: 1;
      font-family: Georgia, serif;
      font-size: 1.125rem;
    }
    .year-fs-year {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
    }
    .year-fs-close {
      min-width: 44px;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;

  const YESNO_PROGRESS = 2;
  const DEFAULT_CATEGORIES = [
    { id: "general", label: "General" },
    { id: "health", label: "Health" },
    { id: "fitness", label: "Fitness" },
    { id: "mind", label: "Mind" },
    { id: "work", label: "Work" },

  const MAX_STEP = 5000;
  const STEPS_BASELINE = 5000;
  const STEPS_BASELINE_NAME = "Steps";

  }
  let monthGridScrollLeft = 0;
  let yearExpandedScrollLeft = 0;
  let monthGridScrolledToToday = false;
  let yearExpandedHabits = {};
  let yearExpandOrder = [];

  let habitEditId = null;
  let habitsCatPanelOpen = false;
  let pendingImport = null;

  /** 0 = empty, 1–5 = light → dark (5 = all-time high) */
  const GRADIENT = ["#ffffff", "#f8e8f0", "#efb8d0", "#e080a8", "#c94d78", "#7a1f45"];

  function defaultState() {
    return {
      version: 2,
      year: new Date().getFullYear(),
      month: new Date().getMonth(),
      categoryFilter: "all",
      categories: DEFAULT_CATEGORIES.map(function (c) {
        return { id: c.id, label: c.label };
      }),
      habits: [
        {
          id: uid(),

          category: "fitness",

  }

  function cloneDefaultCategories() {
    return DEFAULT_CATEGORIES.map(function (c) {
      return { id: c.id, label: c.label };
    });
  }

  function categoryLabel(catId) {
    const c = (state.categories || []).find(function (x) { return x.id === catId; });
    return c ? c.label : "General";
  }

  function slugCategoryId(label) {
    const base = String(label || "")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "_")
      .replace(/^_|_$/g, "")
      .slice(0, 28);
    let id = base || "category";
    if (id === "general") id = "cat_custom";
    let n = 0;
    while ((state.categories || []).some(function (c) { return c.id === id; })) {
      n++;
      id = (base || "category") + "_" + n;
    }
    return id;
  }

  function normalizeCategory(cat, categories) {
    const list = categories || state.categories || DEFAULT_CATEGORIES;
    const id = String(cat || "general").toLowerCase();
    if (list.some(function (c) { return c.id === id; })) return id;
    return "general";
  }

  function ensureCategories() {
    if (!Array.isArray(state.categories) || !state.categories.length) {
      state.categories = cloneDefaultCategories();
    }
    const seen = {};
    state.categories = state.categories
      .map(function (c) {
        const id = String(c.id || "").toLowerCase() || "general";
        const label = String(c.label || id).slice(0, 32);
        if (seen[id]) return null;
        seen[id] = true;
        return { id: id, label: label };
      })
      .filter(Boolean);
    if (!state.categories.some(function (c) { return c.id === "general"; })) {
      state.categories.unshift({ id: "general", label: "General" });
    }
    state.habits.forEach(function (h) {
      const cat = h.category;
      if (cat && cat !== "general" && !state.categories.some(function (c) { return c.id === cat; })) {
        state.categories.push({ id: cat, label: cat.replace(/_/g, " ") });
      }
    });
    if (state.categoryFilter && state.categoryFilter !== "all") {
      if (!state.categories.some(function (c) { return c.id === state.categoryFilter; })) {
        state.categoryFilter = "all";
      }
    } else if (!state.categoryFilter) {
      state.categoryFilter = "all";
    }
  }

  function normalizeExcludeDays(arr) {
    if (!Array.isArray(arr)) return [];
    const out = [];
    arr.forEach(function (d) {
      const n = parseInt(d, 10);
      if (n >= 0 && n <= 6 && out.indexOf(n) < 0) out.push(n);
    });
    return out.sort(function (a, b) { return a - b; });
  }

  function weekdayIndex(y, m, d) {
    return new Date(y, m, d).getDay();
  }

  function isDayExcluded(habit, y, m, d) {
    if (!habit || habit.type !== "yesno") return false;
    const days = habit.excludeDays;
    if (!days || !days.length) return false;
    return days.indexOf(weekdayIndex(y, m, d)) >= 0;
  }

  function parseCellKeyDate(key) {
    const parts = String(key || "").split("-");
    if (parts.length < 4) return null;
    const dd = parts.pop();
    const mm = parts.pop();
    const y = parts.pop();
    const habitId = parts.join("-");
    const month = parseInt(mm, 10) - 1;
    const day = parseInt(dd, 10);
    const year = parseInt(y, 10);
    if (isNaN(month) || isNaN(day) || isNaN(year)) return null;
    return { habitId: habitId, y: year, m: month, d: day };
  }

  function purgeExcludedCellMarks(habitId) {
    const habit = state.habits.find(function (h) { return h.id === habitId; });
    if (!habit) return;
    Object.keys(state.cells).forEach(function (k) {
      if (k.indexOf(habitId + "-") !== 0) return;
      const parsed = parseCellKeyDate(k);
      if (parsed && isDayExcluded(habit, parsed.y, parsed.m, parsed.d)) {
        delete state.cells[k];
      }
    });
  }

  function renderExcludeDaysHtml(habit) {
    if (habit.type !== "yesno") return "";
    const excluded = habit.excludeDays || [];
    let html = '<div class="exclude-days-row"><span class="exclude-days-label">Skip days</span><div class="exclude-day-chips">';
    WEEKDAY_LETTERS.forEach(function (letter, day) {
      const on = excluded.indexOf(day) >= 0;
      html +=
        '<button type="button" class="exclude-day-chip' +
        (on ? " on" : "") +
        '" data-exclude-day="' +
        escapeHtml(habit.id) +
        '" data-weekday="' +
        day +
        '" aria-pressed="' +
        on +
        '">' +
        letter +
        "</button>";
    });
    html += '</div><p class="hint exclude-days-hint">Grey columns — not tracked (e.g. weekends for weekday shows).</p></div>';
    return html;
  }

  function bindExcludeDays(root) {
    if (!root) return;
    root.querySelectorAll("[data-exclude-day]").forEach(function (btn) {
      btn.onclick = function () {
        const habit = state.habits.find(function (h) {
          return h.id === btn.getAttribute("data-exclude-day");
        });
        if (!habit || habit.type !== "yesno") return;
        const day = parseInt(btn.getAttribute("data-weekday"), 10);
        if (!habit.excludeDays) habit.excludeDays = [];
        const idx = habit.excludeDays.indexOf(day);
        if (idx >= 0) habit.excludeDays.splice(idx, 1);
        else habit.excludeDays.push(day);
        habit.excludeDays = normalizeExcludeDays(habit.excludeDays);
        purgeExcludedCellMarks(habit.id);
        save();
        render();
      };
    });
  }

  function renderHabitEditExcludeDays(habit) {
    const wrap = document.getElementById("habitEditExcludeWrap");
    const chips = document.getElementById("habitEditExcludeDays");
    if (!wrap || !chips) return;
    if (habit.type !== "yesno") {
      wrap.hidden = true;
      chips.innerHTML = "";
      return;
    }
    wrap.hidden = false;
    const excluded = habit.excludeDays || [];
    chips.innerHTML = WEEKDAY_LETTERS.map(function (letter, day) {
      const on = excluded.indexOf(day) >= 0;
      return (

    }).join("");

      btn.onclick = function () {

        const h = state.habits.find(function (x) { return x.id === habitEditId; });
        if (!h || h.type !== "yesno") return;
        const day = parseInt(btn.getAttribute("data-edit-exclude-day"), 10);
        if (!h.excludeDays) h.excludeDays = [];
        const idx = h.excludeDays.indexOf(day);
        if (idx >= 0) h.excludeDays.splice(idx, 1);
        else h.excludeDays.push(day);
        h.excludeDays = normalizeExcludeDays(h.excludeDays);
        renderHabitEditExcludeDays(h);
      };
    });
  }

  function normalizeHabit(h, categories) {
    const base = {
      category: normalizeCategory(h.category, categories),
      pinned: !!h.pinned,
      hidden: !!h.hidden,
    };
    const name = String(h.name || "Habit").slice(0, 40);
    if (isStepsHabitName(name)) {
      const step = Math.min(MAX_STEP, Math.max(1, parseInt(h.step, 10) || STEPS_BASELINE));
      return {
        id: h.id || uid(),
        name: STEPS_BASELINE_NAME,
        type: "counter",
        step: step,
        category: base.category,
        pinned: base.pinned,
        hidden: base.hidden,
      };
    }
    if (h.type === "yesno" || h.type === "counter") {
      const type = h.type;
      const step = Math.min(MAX_STEP, Math.max(1, parseInt(h.step, 10) || 1));
      const out = {
        id: h.id || uid(),
        name: name,
        type: type,
        step: type === "counter" ? step : 1,
        category: base.category,
        pinned: base.pinned,
        hidden: base.hidden,
      };
      if (type === "yesno") out.excludeDays = normalizeExcludeDays(h.excludeDays);
      return out;
    }
    const levels = Array.isArray(h.levels) ? h.levels : [];
    let type = "counter";
    if (levels.length && levels.length <= 3) {
      const blob = levels.map(function (l) { return String(l.label || "").toLowerCase(); }).join(" ");
      if (/yes|no|done|skip|miss|✓|✗/.test(blob)) type = "yesno";
    }
    if (/meditat|stretch|read|journal|floss|vitamin/i.test(name)) type = "yesno";
    const out = {
      id: h.id || uid(),
      name: name,
      type: type,
      step: 1,
      category: base.category,
      pinned: base.pinned,
      hidden: base.hidden,
    };
    if (type === "yesno") out.excludeDays = normalizeExcludeDays(h.excludeDays);
    return out;
  }

  function setHabitHidden(habitId, hidden) {
    const habit = state.habits.find(function (h) { return h.id === habitId; });
    if (!habit) return;
    habit.hidden = !!hidden;
    if (habit.hidden && yearFullscreenHabitId === habitId) closeYearFullscreen();
    save();
    render();
    toast(habit.hidden ? "Hidden from Month & Year" : "Showing in Month & Year");
  }

  function renderHabitHideBtnLabel(hidden, detailed) {
    if (detailed) return hidden ? "Show in grid" : "Hide from grid";
    return hidden ? "Show" : "Hide";
  }

  function pruneUnmarkedMeditation() {
    const habits = state.habits || [];
    const meditation = habits.find(function (h) {
      return /^meditation$/i.test(String(h.name || "").trim());
    });
    if (!meditation) return;
    const medPrefix = meditation.id + "-";
    const medMarks = Object.keys(state.cells || {}).filter(function (k) {
      return k.indexOf(medPrefix) === 0;
    }).length;
    if (medMarks > 0) return;
    state.habits = habits.filter(function (h) {
      return h.id !== meditation.id;
    });
    save();
  }

  function getFilteredHabits(onlyVisible) {
    return state.habits.filter(function (h) {
      if (onlyVisible && h.hidden) return false;
      if (!state.categoryFilter || state.categoryFilter === "all") return true;
      return h.category === state.categoryFilter;
    });
  }

  function moveHabitInOrder(habitId, direction) {
    const filtered = getFilteredHabits(true);
    const idx = filtered.findIndex(function (h) {
      return h.id === habitId;
    });
    if (idx < 0) return false;
    const swapIdx = direction === "up" ? idx - 1 : idx + 1;
    if (swapIdx < 0 || swapIdx >= filtered.length) return false;
    const iA = state.habits.findIndex(function (h) {
      return h.id === filtered[idx].id;
    });
    const iB = state.habits.findIndex(function (h) {
      return h.id === filtered[swapIdx].id;
    });
    if (iA < 0 || iB < 0) return false;
    const tmp = state.habits[iA];
    state.habits[iA] = state.habits[iB];
    state.habits[iB] = tmp;
    return save();
  }

  function addHabitToState(name, category, step) {
    const cat = normalizeCategory(category);
    const habitName = String(name || "New habit").trim().slice(0, 40) || "New habit";
    const stepVal = Math.min(MAX_STEP, Math.max(1, parseInt(step, 10) || 1));
    state.habits.push({
      id: uid(),
      name: habitName,
      type: "counter",
      step: stepVal,
      category: cat,
      pinned: false,
      hidden: false,
    });
    return save();
  }

  function bindMonthAddHabit(root) {
    const btn = root.querySelector("#monthAddHabit");
    if (!btn) return;
    const inp = root.querySelector("#monthNewHabitName");
    const catEl = root.querySelector("#monthNewHabitCategory");
    const stepEl = root.querySelector("#monthNewHabitStep");
    function addMonthHabit() {
      const cat = catEl ? normalizeCategory(catEl.value) : "general";
      const name = (inp && inp.value.trim()) || "New " + categoryLabel(cat) + " habit";
      const step = stepEl ? stepEl.value : 1;
      if (!addHabitToState(name, cat, step)) return;
      if (inp) inp.value = "";
      if (stepEl) stepEl.value = "1";
      toast("Added " + name);
      render();
    }
    btn.onclick = addMonthHabit;
    if (inp) {
      inp.onkeydown = function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          addMonthHabit();
        }
      };
    }

    root.querySelectorAll("[data-habit-move]").forEach(function (btn) {
      btn.onclick = function (e) {
        e.stopPropagation();
        if (btn.disabled) return;
        moveHabitInOrder(btn.getAttribute("data-habit-move"), btn.getAttribute("data-dir"));

        openHabitEdit(btn.getAttribute("data-habit-edit"));

  function openHabitEdit(habitId) {
    const habit = state.habits.find(function (h) { return h.id === habitId; });
    if (!habit) return;
    habitEditId = habitId;
    document.getElementById("habitEditTitle").textContent = "Edit habit";
    document.getElementById("habitEditName").value = habit.name;
    const catSel = document.getElementById("habitEditCategory");
    catSel.innerHTML = "";
    state.categories.forEach(function (cat) {
      const opt = document.createElement("option");
      opt.value = cat.id;
      opt.textContent = cat.label;
      if (habit.category === cat.id) opt.selected = true;
      catSel.appendChild(opt);
    });
    const stepWrap = document.getElementById("habitEditStepWrap");
    const stepInp = document.getElementById("habitEditStep");
    if (habit.type === "counter") {
      stepWrap.hidden = false;
      stepInp.value = habit.step || 1;
    } else {
      stepWrap.hidden = true;
    }
    renderHabitEditExcludeDays(habit);
    const hideBtn = document.getElementById("habitEditHide");
    if (hideBtn) {
      hideBtn.classList.toggle("on", !!habit.hidden);
      hideBtn.setAttribute("aria-pressed", String(!!habit.hidden));
      hideBtn.textContent = renderHabitHideBtnLabel(habit.hidden, true);
    }
    document.getElementById("habitEditSheet").hidden = false;
    document.body.classList.add("habit-edit-open");
    document.getElementById("habitEditName").focus();

  function closeHabitEdit() {
    habitEditId = null;
    const sheet = document.getElementById("habitEditSheet");
    if (sheet) sheet.hidden = true;
    document.body.classList.remove("habit-edit-open");
  }

  function saveHabitEdit() {
    if (!habitEditId) return;
    const habit = state.habits.find(function (h) { return h.id === habitEditId; });
    if (!habit) {
      closeHabitEdit();
      return;
    }
    const name = document.getElementById("habitEditName").value.trim() || "Habit";
    habit.name = name.slice(0, 40);
    habit.category = normalizeCategory(document.getElementById("habitEditCategory").value);
    if (habit.type === "counter") {
      habit.step = Math.min(
        MAX_STEP,
        Math.max(1, parseInt(document.getElementById("habitEditStep").value, 10) || 1)
      );
    }
    if (habit.type === "yesno") {
      habit.excludeDays = normalizeExcludeDays(habit.excludeDays);
      purgeExcludedCellMarks(habit.id);
    }
    if (!save()) return;
    const savedName = habit.name;
    closeHabitEdit();
    render();
    toast("Updated " + savedName);
  }

  function isYearHabitExpanded(habitId) {
    return !!yearExpandedHabits[habitId];
  }

  function setYearHabitExpanded(habitId, open) {
    if (open) {
      yearExpandedHabits[habitId] = true;
      if (yearExpandOrder.indexOf(habitId) < 0) yearExpandOrder.push(habitId);
    } else {
      delete yearExpandedHabits[habitId];
      yearExpandOrder = yearExpandOrder.filter(function (id) {
        return id !== habitId;
      });
      if (yearFullscreenHabitId === habitId) closeYearFullscreen();
    }
  }

  function expandAllYearHabits(habits) {

    habits.forEach(function (h) {
      yearExpandedHabits[h.id] = true;
      yearExpandOrder.push(h.id);
    });

  function collapseAllYearHabits() {

    yearExpandOrder.forEach(function (id) {

    habits.forEach(function (h) {

  function parseLevelLabelValue(label) {
    const m = String(label || "").match(/(\d+(?:\.\d+)?)/);
    return m ? parseFloat(m[1]) : NaN;
  }

  function migrateCellValue(habit, levelIndex, legacyLevels) {
    if (levelIndex == null || levelIndex <= 0) return null;
    if (habit.type === "yesno") {
      if (levelIndex >= (legacyLevels && legacyLevels.length ? legacyLevels.length - 1 : 2)) return 1;
      return levelIndex === 1 ? 1 : 0;
    }
    if (legacyLevels && legacyLevels[levelIndex]) {
      const n = parseLevelLabelValue(legacyLevels[levelIndex].label);
      if (!isNaN(n) && n > 0) return n;
    }
    return levelIndex * 10;
  }

  function uid() {
    return "h" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  function storageAvailable() {
    try {
      const t = "__hj_w__";
      localStorage.setItem(t, "1");
      localStorage.removeItem(t);
      return true;
    } catch (e) {
      return false;
    }
  }

  function showStorageBanner(msg) {
    const el = document.getElementById("storageBanner");
    if (!el) return;
    el.textContent = msg;
    el.classList.add("show");
  }

  function loadState() {
    try {
      let raw = localStorage.getItem(STORAGE_KEY);
      let recoveredFrom = null;
      if (!raw) {
        raw = localStorage.getItem(STORAGE_LOCAL_BACKUP_KEY);
        if (raw) recoveredFrom = "local";
      }
      if (!raw) {
        raw = sessionStorage.getItem(STORAGE_BACKUP_KEY);
        if (raw) recoveredFrom = "session";
      }
      if (!raw) raw = localStorage.getItem(STORAGE_KEY_LEGACY);
      if (!raw) return defaultState();
      if (recoveredFrom) {
        try {
          localStorage.setItem(STORAGE_KEY, raw);
        } catch (e) { /* ok */ }
      }
      const p = JSON.parse(raw);
      if (!p || !Array.isArray(p.habits)) return defaultState();
      const s = defaultState();
      s.year = typeof p.year === "number" ? p.year : s.year;
      s.month = typeof p.month === "number" ? Math.min(11, Math.max(0, p.month)) : s.month;
      s.cells = {};
      if (p.cells && typeof p.cells === "object") {
        Object.keys(p.cells).forEach(function (k) {
          const v = p.cells[k];
          if (typeof v === "number") s.cells[k] = v;
        });
      }
      if (Array.isArray(p.categories) && p.categories.length) {
        s.categories = p.categories.map(function (c) {
          return { id: String(c.id || "general").toLowerCase(), label: String(c.label || "Category").slice(0, 32) };
        });
      } else {
        s.categories = cloneDefaultCategories();
      }
      s.categoryFilter = typeof p.categoryFilter === "string" ? p.categoryFilter : "all";
      s.migratedStepsDefault = !!p.migratedStepsDefault;
      const legacyHabits = p.habits.slice();
      s.habits = legacyHabits.map(function (h) {
        return normalizeHabit(h, s.categories);
      });
      if (!s.habits.length) s.habits = defaultState().habits;
      const isLegacy = p.version !== 2 || legacyHabits.some(function (h) { return h && h.levels; });
      if (isLegacy) {
        try {
          legacyHabits.forEach(function (oldH, i) {
            const nh = s.habits[i];
            if (!nh || !oldH || !oldH.levels) return;
            Object.keys(s.cells).forEach(function (k) {
              if (k.indexOf(nh.id + "-") !== 0) return;
              const idx = s.cells[k];
              if (typeof idx !== "number" || idx < 1) return;
              const v = migrateCellValue(nh, idx, oldH.levels);
              if (v == null) delete s.cells[k];
              else s.cells[k] = v;
            });
          });
          localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({
              version: 2,
              year: s.year,
              month: s.month,
              habits: s.habits,
              cells: s.cells,
              categories: s.categories,
              categoryFilter: s.categoryFilter,
              migratedStepsDefault: s.migratedStepsDefault,
            })
          );
        } catch (e) { /* migration optional */ }
      }
      if (recoveredFrom) window.__hjRecoveredFrom = recoveredFrom;
      return s;
    } catch (e) {
      return defaultState();
    }
  }

  function writeMeta() {
    try {
      localStorage.setItem(
        STORAGE_META_KEY,
        JSON.stringify({
          lastSavedAt: Date.now(),
          habits: state.habits.length,
          marks: Object.keys(state.cells).length,
        })
      );
    } catch (e) { /* ok */ }
  }

  function readMeta() {
    try {
      const raw = localStorage.getItem(STORAGE_META_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  function formatSavedWhen(ts) {
    if (!ts) return "not yet";
    const sec = Math.floor((Date.now() - ts) / 1000);
    if (sec < 10) return "just now";
    if (sec < 60) return sec + " sec ago";
    if (sec < 3600) return Math.floor(sec / 60) + " min ago";
    if (sec < 86400) return Math.floor(sec / 3600) + " hr ago";
    return new Date(ts).toLocaleString();
  }

  function clearAllStorage() {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_LOCAL_BACKUP_KEY);
    localStorage.removeItem(STORAGE_META_KEY);
    localStorage.removeItem(STORAGE_KEY_LEGACY);
    sessionStorage.removeItem(STORAGE_BACKUP_KEY);
  }

  let state = loadState();
  let activeTab = "month";
  let eraserMode = false;

  function ensureHabitsReady() {
    ensureCategories();
    if (!Array.isArray(state.habits) || !state.habits.length) {
      state.habits = defaultState().habits;
      save();
    }
    state.habits = state.habits.map(function (h) {
      var n = normalizeHabit(h || {}, state.categories);
      if (n.type === "counter" && !n.step) n.step = 1;
      return n;
    });
    migrateLegacyFactoryHabits();
    pruneUnmarkedMeditation();
  }

  function showFatalError(msg) {
    var html = '<div class="card"><p class="hint">' + escapeHtml(msg) + "</p></div>";
    ["panelMonth", "panelYear", "panelHabits", "panelData"].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.innerHTML = html;
    });
  }

  function save() {
    if (!storageOk) {
      toast("Saving disabled — use Safari, not Private mode");
      return false;
    }
    const json = JSON.stringify(state);
    try {
      localStorage.setItem(STORAGE_KEY, json);
      localStorage.setItem(STORAGE_LOCAL_BACKUP_KEY, json);
      sessionStorage.setItem(STORAGE_BACKUP_KEY, json);
      writeMeta();
      return true;
    } catch (e) {
      try {
        sessionStorage.setItem(STORAGE_BACKUP_KEY, json);
        toast("Saved to session only — check storage");
      } catch (e2) {
        toast("Could not save");
      }
      return false;
    }
  }

  function flushSave() {
    save();
  }

  function toast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { el.classList.remove("show"); }, 2200);
  }

  function cellKey(habitId, y, m, d) {
    const mm = String(m + 1).padStart(2, "0");
    const dd = String(d).padStart(2, "0");
    return habitId + "-" + y + "-" + mm + "-" + dd;
  }

  function daysInMonth(y, m) {
    return new Date(y, m + 1, 0).getDate();
  }

  function getCellValue(key) {
    const v = state.cells[key];
    return typeof v === "number" ? v : null;
  }

  function isCellFilled(habit, value) {
    if (value === null || value === undefined) return false;
    if (habit.type === "yesno") return value >= 1;
    return value > 0;
  }

  function habitStreak(habit) {
    let streak = 0;
    const cursor = new Date();
    cursor.setHours(0, 0, 0, 0);
    for (let guard = 0; guard < 4000; guard++) {
      const y = cursor.getFullYear();
      const m = cursor.getMonth();
      const d = cursor.getDate();
      if (isDayExcluded(habit, y, m, d)) {
        cursor.setDate(cursor.getDate() - 1);
        continue;
      }
      const val = getCellValue(cellKey(habit.id, y, m, d));
      if (!isCellFilled(habit, val)) break;
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }
    return streak;
  }

  function getAllTimeHigh(habitId) {
    const habit = state.habits.find(function (h) { return h.id === habitId; });
    if (!habit) return 0;
    if (habit.type === "yesno") return YESNO_PROGRESS;
    let max = 0;
    const prefix = habitId + "-";
    Object.keys(state.cells).forEach(function (k) {
      if (k.indexOf(prefix) !== 0) return;
      const v = state.cells[k];
      if (typeof v === "number" && v > max) max = v;
    });
    return max;
  }

  function valueToBucket(habit, value, high) {
    if (value === null || value === undefined) return 0;
    if (habit.type === "yesno") {
      if (value === YESNO_PROGRESS) return 3;
      if (value >= 1) return 5;
      if (value === 0) return 2;
      return 0;
    }
    if (value <= 0) return 0;
    high = Math.max(high, habit.step || 1, 1);
    const bucket = Math.round((value / high) * 5);
    return Math.min(5, Math.max(1, bucket));
  }

  function bucketThresholdLabel(habit, bucket, high) {
    if (bucket === 0) return "0";
    if (habit.type === "yesno") {
      if (bucket >= 5) return "Yes";
      if (bucket === 3) return "In progress";
      return "No";
    }
    if (!high) return String(bucket);
    return String(Math.round((high * bucket) / 5));
  }

  function cellStyle(habit, value, y, m, d) {
    if (habit.type === "yesno" && y != null && isDayExcluded(habit, y, m, d)) {
      return "background:#d8d4cc;border-color:#c8c4bc;color:#a89e94";
    }
    if (habit.type === "yesno") {
      if (value === YESNO_PROGRESS) return "background:#f5d76e;border-color:#e6c65c;color:#6b5a18";
      if (value >= 1) return "background:" + GRADIENT[5] + ";border-color:transparent;color:#fff";
      if (value === 0) return "background:" + GRADIENT[2] + ";border-color:transparent;color:var(--accent-dark)";
      return "background:#fff;border-color:var(--border)";
    }
    const high = getAllTimeHigh(habit.id);
    const b = valueToBucket(habit, value, high);
    let style = "background:" + GRADIENT[b] + ";border-color:" + (b === 0 ? "var(--border)" : "transparent");
    if (b === 5) style += ";color:#fff";
    return style;
  }

  function formatCounterDisplay(value) {
    const v = Math.round(value);
    if (v >= 1000) return String(Math.round(v / 1000)) + "k";
    return String(v);
  }

  function formatStepBracket(step) {
    const n = Math.round(step || 1);
    if (n >= 1000) return n.toLocaleString("en-US");
    return String(n);
  }

  function habitMonthLabelHtml(habit) {
    let html = (habit.pinned ? "★ " : "") + escapeHtml(habit.name);
    if (habit.type === "counter") {
      html += '<span class="habit-label-step">(' + escapeHtml(formatStepBracket(habit.step)) + ")</span>";
    }
    const streak = habitStreak(habit);
    if (streak > 0) {
      html +=
        '<span class="habit-label-streak">' +
        streak +
        " day" +
        (streak === 1 ? "" : "s") +
        "</span>";
    }
    return html;
  }

  function migrateLegacyFactoryHabits() {
    if (state.migratedStepsDefault) return;
    const habits = state.habits || [];
    const running = habits.find(function (h) {
      return /^running$/i.test(String(h.name || "").trim());
    });
    const meditation = habits.find(function (h) {
      return /^meditation$/i.test(String(h.name || "").trim());
    });
    const marks = Object.keys(state.cells || {}).length;
    if (habits.length === 2 && running && meditation && marks === 0) {
      state.habits = defaultState().habits.map(function (h) {
        return normalizeHabit(h, state.categories);
      });
      state.migratedStepsDefault = true;
      save();
      return;
    }
    if (habits.length === 1 && running && marks === 0) {
      state.habits = defaultState().habits.map(function (h) {
        return normalizeHabit(h, state.categories);
      });
      state.migratedStepsDefault = true;
      save();
      return;
    }
    if (running && (!meditation || habits.length <= 2)) {
      const prevStep = parseInt(running.step, 10);
      running.name = STEPS_BASELINE_NAME;
      running.type = "counter";
      running.step = Math.min(
        MAX_STEP,
        Math.max(1, prevStep > 1 ? prevStep : STEPS_BASELINE)
      );
      running.category = running.category || "fitness";
      delete running.stepLocked;
      if (meditation) {
        const medPrefix = meditation.id + "-";
        const medMarks = Object.keys(state.cells).filter(function (k) {
          return k.indexOf(medPrefix) === 0;
        }).length;
        if (!medMarks) {
          state.habits = habits.filter(function (h) {
            return h.id !== meditation.id;
          });
        }
      }
      state.migratedStepsDefault = true;
      save();
    }
  }

  function cellDisplay(habit, value) {
    if (value === null || value === undefined) return { text: "", cls: "" };
    if (habit.type === "yesno") {
      if (value === YESNO_PROGRESS) return { text: "◐", cls: "cell-progress" };
      if (value >= 1) return { text: "✓", cls: "cell-yes" };
      if (value === 0) return { text: "✗", cls: "cell-no" };
    }
    if (value > 0) return { text: formatCounterDisplay(value), cls: "cell-count" };
    return { text: "", cls: "" };
  }

  function isTodayColumn(y, m, d) {
    const t = new Date();
    return y === t.getFullYear() && m === t.getMonth() && d === t.getDate();
  }

  function refreshCellButton(btn) {
    if (!btn || !btn.dataset.key) return;
    const p = btn.dataset.key.split("|");
    const habit = state.habits.find(function (h) { return h.id === p[0]; });
    if (!habit) return;
    const y = parseInt(p[1], 10);
    const mo = parseInt(p[2], 10);
    const d = parseInt(p[3], 10);
    const value = getCellValue(cellKey(habit.id, y, mo, d));
    const todayCls = isTodayColumn(y, mo, d) ? " col-today" : "";
    if (btn.classList.contains("cell-year-shade")) {
      btn.className = ("cell cell-year-shade" + todayCls).trim();
      btn.style.cssText = cellStyle(habit, value, y, mo, d);
      btn.textContent = "";
      btn.setAttribute("aria-label", habit.name + " " + (value != null ? value : "empty"));
      return;
    }
    const disp = cellDisplay(habit, value);
    btn.className = ("cell " + disp.cls + todayCls).trim();
    btn.style.cssText = cellStyle(habit, value, y, mo, d);
    btn.textContent = disp.text;
    btn.setAttribute("aria-label", habit.name + " " + (value != null ? value : "empty"));
  }

  function renderYearHeatmapCell(habit, y, m, d) {
    const dataKey = habit.id + "|" + y + "|" + m + "|" + d;
    const todayCls = isTodayColumn(y, m, d) ? " col-today" : "";
    if (isDayExcluded(habit, y, m, d)) {
      return (
        '<button type="button" class="cell cell-year-shade cell-blocked' +
        todayCls +
        '" data-key="' +
        dataKey +
        '" disabled style="' +
        cellStyle(habit, null, y, m, d) +
        '" aria-label="' +
        escapeHtml(habit.name) +
        ' blocked"></button>'
      );
    }
    const value = getCellValue(cellKey(habit.id, y, m, d));
    const counterAttr = habit.type === "counter" ? ' data-counter="1"' : "";
    return (
      '<button type="button" class="cell cell-year-shade' +
      todayCls +
      '" data-key="' +
      dataKey +
      '"' +
      counterAttr +
      ' style="' +
      cellStyle(habit, value, y, m, d) +
      '" aria-label="' +
      escapeHtml(habit.name) +
      " " +
      (value != null ? value : "empty") +
      '"></button>'
    );
  }

  function afterCellChange(habitId, y, m, d) {
    save();
    const key = habitId + "|" + y + "|" + m + "|" + d;
    const btn =
      document.querySelector('#yearFsBody .year-fs-cells .cell[data-key="' + key + '"]') ||
      document.querySelector('#panelYear .cell[data-key="' + key + '"]') ||
      document.querySelector('#panelMonth .cell[data-key="' + key + '"]');
    if (btn) {
      refreshCellButton(btn);
      if (activeTab === "month") return;
      if (activeTab === "year" && yearFullscreenHabitId) return;
    }
    if (activeTab === "month") {
      renderMonth();
      return;
    }
    if (activeTab === "year") {
      renderYear();
      return;
    }
    render();
  }

  function buildYearHeatmapCellsHtml(habit) {
    let html = "";
    for (let d = 1; d <= 31; d++) {
      for (let m = 0; m < 12; m++) {
        const dim = daysInMonth(state.year, m);
        if (d > dim) {
          html += '<span class="cell cell-pad cell-invalid" aria-hidden="true"></span>';
        } else {
          html += renderYearHeatmapCell(habit, state.year, m, d);
        }
      }
    }
    return html;
  }

  function buildYearGalleryHeatmapHtml(habit) {
    return (
      '<div class="year-grid-heatmap year-gallery-heatmap" role="img" aria-label="' +
      escapeHtml(habit.name) +
      ' year overview">' +
      buildYearHeatmapCellsHtml(habit) +
      "</div>"
    );
  }

  function buildYearDetailHtml(habit) {
    let html = '<div class="year-fs-layout">';
    html += '<div class="year-fs-chart">';
    html += '<div class="year-fs-corner" aria-hidden="true"></div>';
    html += '<div class="year-fs-months">';
    MONTH_LETTERS.forEach(function (letter) {
      html += '<span class="year-fs-month">' + letter + "</span>";
    });
    html += '</div><div class="year-fs-days">';
    for (let d = 1; d <= 31; d++) {
      html += '<span class="year-fs-day">' + d + "</span>";
    }
    html += '</div><div class="year-fs-cells">';
    html += buildYearHeatmapCellsHtml(habit);
    html += "</div></div>";
    html +=
      '<div class="year-fs-mode-bar" role="toolbar" aria-label="Mark or erase">' +
      '<button type="button" class="mode-btn' +
      (eraserMode ? "" : " on") +
      '" data-mode-action="mark" aria-pressed="' +
      !eraserMode +
      '">Mark</button>' +
      '<button type="button" class="mode-btn' +
      (eraserMode ? " on" : "") +
      '" data-mode-action="eraser" aria-pressed="' +
      eraserMode +
      '">Eraser</button></div>';
    html += '<div class="year-fs-legend">' + renderLegendCompact(habit) + "</div>";
    html += "</div>";
    return html;
  }

  function buildYearHeatmapHtml(habit) {
    return buildYearGalleryHeatmapHtml(habit);
  }

  function openYearFullscreen(habitId) {
    const habit = state.habits.find(function (h) { return h.id === habitId; });
    if (!habit) return;
    yearFullscreenHabitId = habitId;
    document.getElementById("yearFsTitle").textContent = yearHabitFullscreenTitle(habit);
    document.getElementById("yearFsYear").textContent = String(state.year);
    const body = document.getElementById("yearFsBody");
    body.innerHTML = buildYearDetailHtml(habit);
    body.querySelectorAll(".year-fs-cells .cell[data-key]").forEach(function (cell) {
      cell.style.pointerEvents = "auto";
      cell.style.cursor = "pointer";
    });
    document.getElementById("yearFullscreen").hidden = false;
    document.body.classList.add("year-fs-open");
    bindCells(body);
  }

  function closeYearFullscreen() {
    yearFullscreenHabitId = null;
    const overlay = document.getElementById("yearFullscreen");
    if (overlay) overlay.hidden = true;
    document.body.classList.remove("year-fs-open");
  }

  function tapCell(habitId, y, m, d) {
    const habit = state.habits.find(function (h) { return h.id === habitId; });
    if (!habit) return;
    if (isDayExcluded(habit, y, m, d)) return;
    const key = cellKey(habitId, y, m, d);
    const v = getCellValue(key);
    if (habit.type === "yesno") {
      if (v === null) state.cells[key] = YESNO_PROGRESS;
      else if (v === YESNO_PROGRESS) state.cells[key] = 1;
      else if (v === 1) state.cells[key] = 0;
      else delete state.cells[key];
    } else {
      const step = habit.step || 1;
      const next = (v || 0) + step;
      state.cells[key] = next;
    }
    afterCellChange(habitId, y, m, d);
  }

  function eraseCell(habitId, y, m, d) {
    const habit = state.habits.find(function (h) { return h.id === habitId; });
    if (!habit) return;
    if (isDayExcluded(habit, y, m, d)) return;
    const key = cellKey(habitId, y, m, d);
    const v = getCellValue(key);
    if (v === null) return;
    if (habit.type === "yesno") {
      if (v === 0) state.cells[key] = 1;
      else if (v === 1) state.cells[key] = YESNO_PROGRESS;
      else delete state.cells[key];
    } else {
      const step = habit.step || 1;
      const next = v - step;
      if (next <= 0) delete state.cells[key];
      else state.cells[key] = next;
    }
    afterCellChange(habitId, y, m, d);
  }

  function decrementCell(habitId, y, m, d) {
    eraseCell(habitId, y, m, d);
  }

  function setEraserMode(on) {
    eraserMode = !!on;
    updateModeBar();
    if (eraserMode) toast("Eraser on — tap a cell to subtract or clear");
    else toast("Mark mode — tap to add");
  }

  function syncModeButtons() {
    document.querySelectorAll("[data-mode-action]").forEach(function (btn) {
      const isEraser = btn.getAttribute("data-mode-action") === "eraser";
      btn.classList.toggle("on", isEraser ? eraserMode : !eraserMode);
      btn.setAttribute("aria-pressed", String(isEraser ? eraserMode : !eraserMode));
    });
  }

  function updateModeBar() {
    const bar = document.getElementById("modeBar");
    if (!bar) return;
    const show = activeTab === "month" || activeTab === "year";
    bar.hidden = !show;
    document.body.classList.toggle("has-mode-bar", show);
    syncModeButtons();
  }

  function renderTopNav() {
    const nav = document.getElementById("topNav");
    if (!nav) return;
    if (activeTab === "habits" || activeTab === "data") {
      nav.innerHTML = '<span class="nav-label">' + state.year + "</span>";
      return;
    }
    if (activeTab === "year") {
      nav.innerHTML =
        '<button type="button" class="nav-btn" id="yearPrev" aria-label="Previous year">‹</button>' +
        '<span class="nav-label">' + state.year + "</span>" +
        '<button type="button" class="nav-btn" id="yearNext" aria-label="Next year">›</button>';
      document.getElementById("yearPrev").onclick = function () { state.year--; save(); render(); };
      document.getElementById("yearNext").onclick = function () { state.year++; save(); render(); };
      return;
    }
    nav.innerHTML =
      '<button type="button" class="nav-btn" id="monthPrev" aria-label="Previous month">‹</button>' +
      '<span class="nav-label">' + MONTHS_FULL[state.month] + " " + state.year + "</span>" +
      '<button type="button" class="nav-btn" id="monthNext" aria-label="Next month">›</button>';
    document.getElementById("monthPrev").onclick = function () {
      state.month--;
      if (state.month < 0) { state.month = 11; state.year--; }
      monthGridScrollLeft = 0;
      monthGridScrolledToToday = false;
      save(); render();
    };
    document.getElementById("monthNext").onclick = function () {
      state.month++;

      monthGridScrollLeft = 0;
      monthGridScrolledToToday = false;
      save(); render();
    };
  }

  function renderLegendCompact(habit) {
    const high = Math.max(getAllTimeHigh(habit.id), habit.type === "counter" ? (habit.step || 1) : 1);
    let html = '<div class="legend-scale legend-compact">';
    if (habit.type === "yesno") {
      html += '<div class="legend-item-compact"><span class="legend-swatch" style="background:#d8d4cc"></span><span>Skip</span></div>';
      html += '<div class="legend-item-compact"><span class="legend-swatch" style="background:#f5d76e"></span><span>In progress</span></div>';
      html += '<div class="legend-item-compact"><span class="legend-swatch" style="background:' + GRADIENT[5] + '"></span><span>Yes</span></div>';
      html += '<div class="legend-item-compact"><span class="legend-swatch" style="background:' + GRADIENT[2] + '"></span><span>No</span></div>';
      html += "</div>";
      return html;
    }
    const buckets = [0, 3, 5];
    buckets.forEach(function (b) {
      html += '<div class="legend-item-compact">';
      html += '<span class="legend-swatch" style="background:' + GRADIENT[b] + '"></span>';
      html += "<span>" + escapeHtml(bucketThresholdLabel(habit, b, high)) + "</span></div>";
    });
    html += "</div>";
    if (habit.type === "counter") {
      html +=
        '<p class="legend-high-note">High: <strong>' +
        escapeHtml(formatCounterDisplay(high)) +
        "</strong></p>";
    }
    return html;
  }

  function renderLegend(habit) {
    let html = renderLegendCompact(habit);
    if (habit.type === "counter") {
      html += "<p style=\"font-size:0.6875rem;color:var(--muted);margin-top:6px\">Mark: tap +step. Eraser or hold: -step</p>";
    } else {
      html += "<p style=\"font-size:0.6875rem;color:var(--muted);margin-top:6px\">Tap: empty → In progress → Yes → No → clear. Eraser steps back.</p>";

  }

  function renderCellButton(habit, y, m, d, extraClass) {
    const key = cellKey(habit.id, y, m, d);
    const dataKey = habit.id + "|" + y + "|" + m + "|" + d;
    const todayCls = isTodayColumn(y, m, d) ? " col-today" : "";
    if (isDayExcluded(habit, y, m, d)) {
      return (
        '<button type="button" class="cell cell-blocked' +
        todayCls +
        (extraClass ? " " + extraClass : "") +
        '" data-key="' +
        dataKey +
        '" disabled style="' +
        cellStyle(habit, null, y, m, d) +
        '" aria-label="' +
        escapeHtml(habit.name) +
        ' blocked"></button>'
      );
    }
    const value = getCellValue(key);
    const disp = cellDisplay(habit, value);
    const cls = "cell " + disp.cls + todayCls + (extraClass || "");
    const counterAttr = habit.type === "counter" ? ' data-counter="1"' : "";
    return (
      '<button type="button" class="' + cls.trim() + '" data-key="' + dataKey + '"' + counterAttr + ' style="' + cellStyle(habit, value, y, m, d) + '" aria-label="' +
      escapeHtml(habit.name) + " " + (value != null ? value : "empty") + '">' + escapeHtml(disp.text) + "</button>"
    );
  }

  function bindCells(root) {
    root.querySelectorAll(".cell[data-key]").forEach(function (btn) {
      let holdTimer = null;
      let held = false;
      btn.onclick = function () {
        if (held) { held = false; return; }
        if (btn.disabled || btn.classList.contains("cell-blocked")) return;
        const p = btn.dataset.key.split("|");
        if (eraserMode) eraseCell(p[0], parseInt(p[1], 10), parseInt(p[2], 10), parseInt(p[3], 10));
        else tapCell(p[0], parseInt(p[1], 10), parseInt(p[2], 10), parseInt(p[3], 10));
      };
      if (btn.dataset.counter && !eraserMode) {
        btn.addEventListener("touchstart", function () {
          held = false;
          holdTimer = setTimeout(function () {
            held = true;
            const p = btn.dataset.key.split("|");
            decrementCell(p[0], parseInt(p[1], 10), parseInt(p[2], 10), parseInt(p[3], 10));
          }, 450);
        }, { passive: true });
        btn.addEventListener("touchend", function () { clearTimeout(holdTimer); });
        btn.addEventListener("touchcancel", function () { clearTimeout(holdTimer); });
        btn.addEventListener("contextmenu", function (e) {
          e.preventDefault();
          held = true;
          const p = btn.dataset.key.split("|");
          decrementCell(p[0], parseInt(p[1], 10), parseInt(p[2], 10), parseInt(p[3], 10));
        });
      }
    });
  }

  function renderMonth() {
    const root = document.getElementById("panelMonth");
    if (!root) return;
    const prevScroller = root.querySelector(".scroll-x");
    if (prevScroller) monthGridScrollLeft = prevScroller.scrollLeft;

    const dim = daysInMonth(state.year, state.month);
    const eraserNote = eraserMode ? " Eraser on — tap a cell to subtract." : "";
    const filtered = getFilteredHabits(true);
    let html = renderCategoryFiltersHtml(true);
    html += '<p class="hint">Tap a name to edit · Mark or Eraser in the bar below.' + eraserNote + " Hold a counter cell to subtract. ▲▼ reorders rows.</p>";
    html += renderMonthAddBarHtml();
    if (!filtered.length) {
      const hiddenCount = state.habits.filter(function (h) {
        if (!h.hidden) return false;
        if (!state.categoryFilter || state.categoryFilter === "all") return true;
        return h.category === state.categoryFilter;
      }).length;
      html +=
        '<p class="month-empty">No habits in this view. Add one above.' +
        (hiddenCount
          ? " " + hiddenCount + " hidden — unhide in the Habits tab or when editing a habit."
          : "") +
        "</p>";
      root.innerHTML = html;
      bindCategoryFilters(root);
      bindMonthAddHabit(root);
      return;
    }
    let cols = "108px";
    for (let d = 1; d <= dim; d++) cols += " 28px";
    html += '<div class="card scroll-x month-scroll"><div class="month-grid" style="grid-template-columns:' + cols + '">';
    html += '<div class="corner"></div>';
    for (let d = 1; d <= dim; d++) {
      const dow = WEEKDAY_LETTERS[new Date(state.year, state.month, d).getDay()];
      const todayCls = isTodayColumn(state.year, state.month, d) ? " is-today" : "";
      html += '<div class="day-head' + todayCls + '"><span class="day-num">' + d + '</span><span class="day-dow">' + dow + "</span></div>";
    }

    filtered.forEach(function (habit, index) {
      html += renderMonthHabitLabelHtml(habit, index, filtered.length);
      for (let d = 1; d <= dim; d++) {
        html += renderCellButton(habit, state.year, state.month, d);
      }
    });

    html += "</div></div>";
    root.innerHTML = html;
    bindCategoryFilters(root);
    bindCells(root);
    bindMonthAddHabit(root);
    bindMonthHabitSort(root);
    bindMonthHabitEdit(root);

    const scroller = root.querySelector(".scroll-x");
    if (scroller) {
      scroller.scrollLeft = monthGridScrollLeft;
      if (!monthGridScrolledToToday) {
        const todayHead = scroller.querySelector(".day-head.is-today");
        if (todayHead) {
          monthGridScrolledToToday = true;
          const grid = scroller.querySelector(".month-grid");
          const offset = todayHead.offsetLeft - (scroller.clientWidth - todayHead.offsetWidth) / 2;
          scroller.scrollLeft = Math.max(0, offset - 108);
        }
      }
    }

      card += '<button type="button" class="habit-pin-btn' + (habit.pinned ? " on" : "") + '" data-pin="' + habit.id + '">' + (habit.pinned ? "★ Pinned" : "☆ Pin") + "</button>";

      if (state.categories.length >= MAX_CATEGORIES) {
        toast("Maximum " + MAX_CATEGORIES + " categories");

      const id = slugCategoryId(label);
      if (state.categories.some(function (c) { return c.label.toLowerCase() === label.toLowerCase(); })) {
        toast("Category already exists");
        return;
      }
      state.categories.push({ id: id, label: label.slice(0, 32) });
      if (inp) inp.value = "";
      save();
      toast("Added " + label);
      render();

      function syncLabel() {
        const id = inp.getAttribute("data-cat-label");
        const cat = state.categories.find(function (c) { return c.id === id; });
        if (!cat) return;
        const label = inp.value.trim().slice(0, 32) || cat.label;
        cat.label = label;
        inp.value = label;
        save();
      }
      inp.onchange = syncLabel;
      inp.onblur = syncLabel;
    });

    root.querySelectorAll("[data-cat-del]").forEach(function (btn) {
      btn.onclick = function () {
        const id = btn.getAttribute("data-cat-del");
        if (!id || id === "general") return;
        const count = state.habits.filter(function (h) { return h.category === id; }).length;
        if (count) {
          if (!confirm(count + " habit(s) use this category. Move them to General and delete category?")) return;
          state.habits.forEach(function (h) {
            if (h.category === id) h.category = "general";
          });
        } else if (!confirm("Delete category \"" + categoryLabel(id) + "\"?")) {
          return;
        }
        state.categories = state.categories.filter(function (c) { return c.id !== id; });
        if (state.categoryFilter === id) state.categoryFilter = "all";
        save();
        render();
      };
    });

    function addNewHabit() {
      const inp = document.getElementById("newHabitName");
      const name = (inp && inp.value.trim()) || "New habit";
      const catEl = document.getElementById("newHabitCategory");
      const stepEl = document.getElementById("newHabitStep");
      const cat = catEl ? normalizeCategory(catEl.value) : "general";
      const step = stepEl ? stepEl.value : 1;
      if (!addHabitToState(name, cat, step)) return;
      if (inp) inp.value = "";
      if (stepEl) stepEl.value = "1";
      toast("Added " + name);
      render();
    }

    document.getElementById("addHabit").onclick = addNewHabit;
    const newInp = document.getElementById("newHabitName");
    if (newInp) {
      newInp.onkeydown = function (e) {
        if (e.key === "Enter") { e.preventDefault(); addNewHabit(); }
      };
    }

    root.querySelectorAll("[data-del]").forEach(function (btn) {
      btn.onclick = function () {
        if (state.habits.length <= 1) { toast("Keep at least one habit"); return; }
        if (!confirm("Remove this habit and all its dots?")) return;
        const id = btn.dataset.del;
        state.habits = state.habits.filter(function (h) { return h.id !== id; });
        Object.keys(state.cells).forEach(function (k) {
          if (k.indexOf(id + "-") === 0) delete state.cells[k];
        });
        save(); render();
      };
    });

    root.querySelectorAll("[data-name]").forEach(function (inp) {
      function syncName() {
        const h = state.habits.find(function (x) { return x.id === inp.dataset.name; });
        if (h) { h.name = inp.value.trim() || "Habit"; save(); }
      }
      inp.onchange = syncName;
      inp.onblur = syncName;
    });

    root.querySelectorAll(".type-pill").forEach(function (btn) {
      btn.onclick = function () {
        const h = state.habits.find(function (x) { return x.id === btn.dataset.hid; });
        if (!h) return;
        h.type = btn.dataset.type;
        if (h.type === "counter") {
          if (!h.step) h.step = isStepsHabitName(h.name) ? STEPS_BASELINE : 1;
          delete h.excludeDays;
        } else if (h.type === "yesno") {
          if (!h.excludeDays) h.excludeDays = [];
        }
        save(); render();
      };
    });

    root.querySelectorAll("[data-step]").forEach(function (inp) {
      inp.onchange = function () {
        const h = state.habits.find(function (x) { return x.id === inp.dataset.step; });
        if (!h) return;
        h.step = Math.min(MAX_STEP, Math.max(1, parseInt(inp.value, 10) || 1));
        save();
        render();
      };
    });

    root.querySelectorAll("[data-cat]").forEach(function (sel) {
      sel.onchange = function () {
        const h = state.habits.find(function (x) { return x.id === sel.dataset.cat; });
        if (h) {
          h.category = normalizeCategory(sel.value);
          save(); render();
        }
      };
    });

    root.querySelectorAll("[data-pin]").forEach(function (btn) {
      btn.onclick = function () {
        const h = state.habits.find(function (x) { return x.id === btn.dataset.pin; });
        if (h) {
          h.pinned = !h.pinned;
          save(); render();
        }
      };
    });

    root.querySelectorAll("[data-hide]").forEach(function (btn) {
      btn.onclick = function () {
        const h = state.habits.find(function (x) { return x.id === btn.dataset.hide; });
        if (h) setHabitHidden(h.id, !h.hidden);
      };
    });
  }

    root.innerHTML =
      '<div class="data-status">' +
      "<strong>Your data is saved on this phone.</strong> " +
      "Reloading the app or pushing updates does <em>not</em> erase habits — only Reset or clearing Safari website data does." +
      '<p class="meta">' + state.habits.length + " habits · " + marks + " marked days · last saved " +
      escapeHtml(formatSavedWhen(meta.lastSavedAt)) + " · auto-backup on every change</p></div>" +
