<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Habit Journal" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#5c4d3c" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <!-- build: hj-year-gallery-v1 -->
  <link rel="icon" href="app-icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="app-icon.png" />
  <link rel="stylesheet" href="../apps-shell.css" />
  <title>Habit Journal</title>
  <style>
    :root {
      --paper: #faf8f5;
      --dot: #e8e2d9;
      --ink: #2c2419;
      --muted: #7a6f62;
      --accent: #c45c5c;
      --accent-dark: #a84a4a;
      --border: #ddd5c8;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tap: 44px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; height: -webkit-fill-available; }
    body {
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      color: var(--ink);
      background-color: var(--paper);
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 18px 18px;
      padding-top: calc(60px + var(--safe-top));
      padding-bottom: calc(64px + var(--safe-bottom));
      overscroll-behavior: none;
    }
    body.has-mode-bar {
      padding-bottom: calc(128px + var(--safe-bottom));
    }
    button, .cell, .tab, .nav-btn { touch-action: manipulation; }
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: calc(8px + var(--safe-top)) 12px 8px;
      background: rgba(250, 248, 245, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar h1 {
      flex: 1;
      min-width: 0;
      font-size: 1.0625rem;
      font-weight: 700;
      font-family: Georgia, "Times New Roman", serif;
    }
    .habit-journal .apps-home-back {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--ink);
    }
    .nav-row { display: flex; align-items: center; gap: 6px; }
    .nav-btn {
      min-width: var(--tap);
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
    }
    .nav-btn:active { background: #f5f0e8; }
    .nav-btn.eraser-btn {
      padding: 0 8px;
      color: var(--muted);
    }
    .nav-btn.eraser-btn.on {
      background: var(--accent);
      border-color: var(--accent-dark);
      color: #fff;
    }
    .nav-btn.eraser-btn svg { display: block; }
    body.eraser-mode .cell:not(.invalid):not(:disabled) {
      box-shadow: inset 0 0 0 1px rgba(196, 92, 92, 0.35);
    }
    .nav-label { font-size: 0.9375rem; font-weight: 600; min-width: 100px; text-align: center; }
    main { max-width: 520px; margin: 0 auto; padding: 12px 10px 16px; }
    .panel { display: none; }
    .panel.on { display: block; }
    .card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(44, 36, 25, 0.06);
    }
    .card h2 {
      font-size: 1rem;
      font-family: Georgia, serif;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .habit-tag {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent);
    }
    .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -4px; padding: 4px; }
    .month-grid {
      display: grid;
      gap: 3px;
      min-width: min-content;
    }
    .month-grid .corner {
      width: 92px;
      min-width: 92px;
      position: sticky;
      left: 0;
      z-index: 4;
      background: rgba(255, 255, 255, 0.96);
    }
    .month-grid .day-head {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      font-weight: 700;
      text-align: center;
      padding: 3px 0;
      min-width: 28px;
    }
    .month-grid .day-head .day-num {
      font-size: 0.625rem;
      color: var(--ink);
      line-height: 1.1;
    }
    .month-grid .day-head .day-dow {
      font-size: 0.5rem;
      font-weight: 600;
      color: var(--muted);
      line-height: 1;
      letter-spacing: 0.02em;
    }
    .month-grid .day-head.is-today .day-num,
    .month-grid .day-head.is-today .day-dow {
      color: var(--accent);
      font-weight: 800;
    }
    .month-grid .day-head.is-today {
      background: rgba(196, 92, 92, 0.1);
      border-radius: 6px;
    }
    .month-grid .habit-label {
      font-size: 0.625rem;
      font-weight: 600;
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      line-height: 1.15;
      min-height: 32px;
      position: sticky;
      left: 0;
      z-index: 3;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 4px 0 8px rgba(44, 36, 25, 0.06);
      max-width: 92px;
    }
    .habit-label-step {
      font-size: 0.5625rem;
      font-weight: 700;
      color: var(--muted);
      margin-top: 2px;
    }
    .month-grid .cell.col-today {
      box-shadow: inset 0 0 0 2px var(--accent);
    }
    .cell {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: #fff;
      cursor: pointer;
      padding: 0;
      transition: transform 0.1s;
    }
    .cell:active { transform: scale(0.92); }
    .cell.cell-count {
      border-radius: 8px;
      font-size: 0.5625rem;
      font-weight: 700;
      color: #3d2c2c;
    }
    .year-grid .cell.cell-count { font-size: 0.5rem; }
    .cell.cell-yes { font-size: 0.75rem; font-weight: 700; }
    .habit-settings { margin-top: 10px; }
    .type-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .type-pill {
      flex: 1;
      height: 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
    }
    .type-pill.on {
      border-color: var(--accent);
      background: #fdeaea;
      color: var(--accent-dark);
    }
    .step-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
    }
    .step-row input {
      width: 72px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-align: center;
      font-size: 1rem;
    }
    .legend-scale {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      margin-top: 8px;
    }
    .legend-scale .legend-swatch {
      width: 22px;
      height: 22px;
      border-radius: 4px;
    }
    .legend-scale span {
      font-size: 0.5625rem;
      color: var(--muted);
      text-align: center;
      min-width: 22px;
    }
    .cell.invalid {
      opacity: 0.25;
      pointer-events: none;
      background: transparent;
      border-color: transparent;
    }
    .year-block { margin-bottom: 20px; }
    .year-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .year-toolbar .btn { min-height: 40px; padding: 0 14px; font-size: 0.8125rem; }
    .year-toolbar-hint {
      font-size: 0.75rem;
      color: var(--muted);
      flex: 1 1 100%;
    }
    .category-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 2px 0;
    }
    .category-filters::-webkit-scrollbar { display: none; }
    .category-filters .chip {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
    }
    .category-filters .chip.on {
      border-color: var(--accent);
      background: #fdeaea;
      color: var(--accent-dark);
    }
    .year-toolbar .btn[aria-pressed="true"] {
      border-color: var(--accent);
      background: #fdeaea;
      color: var(--accent-dark);
    }
    .year-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
      align-items: start;
    }
    .year-grid-card {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 1px 4px rgba(44, 36, 25, 0.05);
    }
    .year-grid-card.is-collapsed { padding: 0; cursor: pointer; }
    .year-grid-card.is-collapsed .year-grid-card-head { cursor: pointer; }
    .year-grid-card.is-expanded { padding: 6px 4px 8px; }
    .year-grid-card-head {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      min-height: 40px;
      padding: 8px 6px;
      border: none;
      background: transparent;
      cursor: pointer;
      text-align: left;
      font: inherit;
      color: var(--ink);
    }
    .year-grid-card.is-expanded .year-grid-card-head {
      padding-bottom: 4px;
      cursor: default;
    }
    .year-grid-card.pin .year-grid-card-title::before {
      content: "★ ";
      color: var(--accent);
    }
    .year-grid-card-title {
      flex: 1;
      font-size: 0.6875rem;
      font-weight: 700;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .year-grid-card.is-collapsed .year-grid-card-head .year-caret { transform: none; }
    .year-grid-card.is-expanded .year-grid-card-head .year-caret { transform: rotate(90deg); }
    .year-grid-card-body { display: none; }
    .year-grid-card.is-expanded .year-grid-card-body { display: block; }
    .year-grid-card-open-fs {
      display: block;
      width: 100%;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      text-align: left;
    }
    .year-grid-card .year-grid-heatmap { pointer-events: none; }
    .year-grid-card .legend-compact { margin-top: 4px; }
    .year-grid-card .legend-compact .legend-swatch {
      width: 14px;
      height: 14px;
    }
    .year-grid-card .legend-item-compact { font-size: 0.5rem; min-width: 28px; }
    .year-grid-card .legend-high-note { font-size: 0.5rem; margin-top: 2px; }
    .habits-cat-bar { margin-bottom: 12px; }
    .habits-cat-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      font-size: 0.9375rem;
      font-weight: 700;
      font-family: Georgia, serif;
      cursor: pointer;
      color: var(--ink);
    }
    .habits-cat-toggle .habits-caret,
    .year-caret {
      font-size: 0.6875rem;
      color: var(--muted);
      transition: transform 0.15s ease;
      flex-shrink: 0;
    }
    .habits-cat-bar.is-open .habits-cat-toggle .habits-caret,
    .habits-cat-bar.is-open .habits-cat-toggle .year-caret { transform: rotate(90deg); }
    .habits-cat-panel {
      display: none;
      margin-top: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
    }
    .habits-cat-bar.is-open + .habits-cat-panel { display: block; }
    .habit-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .habit-cat-select {
      flex: 1;
      min-width: 120px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 10px;
      font-size: 0.875rem;
      background: #fff;
    }
    .habit-pin-btn {
      min-height: 40px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
    }
    .habit-pin-btn.on {
      border-color: #f59e0b;
      background: #fffbeb;
      color: #b45309;
    }
    .add-habit-row select {
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 10px;
      font-size: 0.875rem;
      background: #fff;
      min-width: 100px;
    }
    .year-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--paper);
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 18px 18px;
      display: flex;
      flex-direction: column;
      padding: calc(8px + var(--safe-top)) 12px calc(12px + var(--safe-bottom));
    }
    .year-fullscreen[hidden] { display: none !important; }
    body.year-fs-open { overflow: hidden; }
    .year-fs-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .year-fs-head h2 {
      flex: 1;
      font-family: Georgia, serif;
      font-size: 1.125rem;
    }
    .year-fs-year {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
    }
    .year-fs-close {
      min-width: 44px;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font-size: 1.25rem;
      cursor: pointer;
    }
    .year-fs-body {
      flex: 1;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
    }
    .year-fs-body .year-grid-heatmap { margin: 0 auto; max-width: 100%; }
    .year-grid-heatmap {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 1px;
      width: 100%;
    }
    .year-grid-heatmap .cell {
      width: 100%;
      aspect-ratio: 1;
      min-width: 0;
      min-height: 0;
      height: auto;
      border-radius: 1px;
      border: 1px solid var(--border);
      padding: 0;
      pointer-events: none;
      font-size: 0;
      line-height: 0;
      box-sizing: border-box;
    }
    .year-grid-heatmap .cell.cell-yes { font-size: 0; }
    .year-grid-heatmap .cell.cell-pad,
    .year-grid-heatmap .cell.invalid {
      background: #fff;
      border: 1px solid var(--border);
      opacity: 1;
      pointer-events: none;
    }
    .year-fs-body .year-grid-heatmap { gap: 3px; }
    .legend-compact {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .legend-compact .legend-item-compact {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 0.5625rem;
      color: var(--muted);
      min-width: 36px;
    }
    .legend-compact .legend-swatch {
      width: 18px;
      height: 18px;
      border-radius: 3px;
    }
    .legend-high-note {
      font-size: 0.625rem;
      color: var(--muted);
      text-align: center;
      margin-top: 4px;
    }
    .categories-card { margin-bottom: 14px; }
    .categories-card h2 { font-size: 0.9375rem; margin-bottom: 10px; }
    .category-manage-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .category-manage-row input {
      flex: 1;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 10px;
      font-size: 0.875rem;
      background: #fff;
    }
    .category-manage-row .btn-danger {
      flex-shrink: 0;
      min-height: 40px;
      padding: 0 10px;
      font-size: 0.75rem;
    }
    .add-cat-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .add-cat-row input {
      flex: 1;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 1rem;
      background: #fff;
    }
    .month-empty {
      text-align: center;
      padding: 24px 12px;
      color: var(--muted);
      font-size: 0.875rem;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.625rem;
      color: var(--muted);
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }
    .habit-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .habit-row:last-child { border-bottom: none; }
    .add-habit-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .add-habit-row input {
      flex: 1;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 1rem;
      background: #fff;
    }
    .add-habit-row .btn { flex-shrink: 0; min-width: 72px; }
    .habit-row input[type="text"] {
      flex: 1;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 1rem;
    }
    .btn {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 10px;
      border: none;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #fff; border: 1px solid var(--border); color: var(--ink); }
    .btn-danger { background: #fff; border: 1px solid #f5c6c6; color: #b91c1c; }
    .btn-block { width: 100%; margin-top: 8px; }
    .hint { font-size: 0.8125rem; color: var(--muted); line-height: 1.45; margin-bottom: 12px; }
    .data-status {
      background: #f0faf4;
      border: 1px solid #b8e6c8;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 14px;
      font-size: 0.8125rem;
      line-height: 1.5;
      color: var(--ink);
    }
    .data-status strong { color: #166534; }
    .data-status .meta { color: var(--muted); margin-top: 6px; font-size: 0.75rem; }
    .level-editor { margin-top: 8px; }
    .level-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .level-row input[type="color"] { width: 40px; height: 32px; border: none; padding: 0; }
    .level-row input[type="text"] { flex: 1; height: 36px; border: 1px solid var(--border); border-radius: 8px; padding: 0 8px; font-size: 0.875rem; }
    .bottom-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 55;
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      border-top: 1px solid var(--border);
      box-shadow: 0 -4px 16px rgba(44, 36, 25, 0.08);
    }
    .tabbar {
      display: flex;
      background: rgba(255, 255, 255, 0.98);
      padding-bottom: var(--safe-bottom);
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 4px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.625rem;
      font-weight: 600;
      cursor: pointer;
    }
    .tab.on { color: var(--accent); }
    .tab svg { width: 22px; height: 22px; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(72px + var(--safe-bottom));
      transform: translateX(-50%);
      background: var(--ink);
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.875rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .mode-bar {
      display: flex;
      gap: 8px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      background: #faf8f5;
    }
    .mode-bar[hidden] { display: none !important; }
    .mode-btn {
      flex: 1;
      min-height: 44px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .mode-btn.on {
      background: var(--accent);
      border-color: var(--accent-dark);
      color: #fff;
    }
    .mode-btn:not(.on):active { background: #f5f0e8; }
    #importInput {
      position: fixed;
      left: 0; top: 0;
      width: 1px; height: 1px;
      opacity: 0.01;
      overflow: hidden;
    }
  </style>
</head>
<body class="habit-journal">
  <div class="storage-banner" id="storageBanner" role="alert"></div>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="https://mathoose.github.io/cursor-apps/" class="apps-home-back" data-apps-home aria-label="Back to Apps"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg></a>
      <h1>Habit Journal</h1>
      <div class="nav-row" id="topNav"></div>
    </div>
  </header>

  <main>
    <section class="panel on" id="panelMonth" aria-label="Monthly view"></section>
    <section class="panel" id="panelYear" aria-label="Yearly view"></section>
    <section class="panel" id="panelHabits" aria-label="Habits"></section>
    <section class="panel" id="panelData" aria-label="Export and import"></section>
  </main>

  <div class="year-fullscreen" id="yearFullscreen" hidden role="dialog" aria-modal="true" aria-labelledby="yearFsTitle">
    <div class="year-fs-head">
      <div>
        <h2 id="yearFsTitle">Habit</h2>
        <div class="year-fs-year" id="yearFsYear"></div>
      </div>
      <button type="button" class="year-fs-close" id="yearFsClose" aria-label="Close">×</button>
    </div>
    <div class="year-fs-body" id="yearFsBody"></div>
  </div>

  <div class="bottom-dock" id="bottomDock">
    <div class="mode-bar" id="modeBar" role="toolbar" aria-label="Mark or erase" hidden>
      <button type="button" class="mode-btn on" data-mode-action="mark" aria-pressed="true">Mark</button>
      <button type="button" class="mode-btn" data-mode-action="eraser" aria-pressed="false">Eraser</button>
    </div>
    <nav class="tabbar" aria-label="Main">
      <button type="button" class="tab on" data-tab="month">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Month
      </button>
      <button type="button" class="tab" data-tab="year">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Year
      </button>
      <button type="button" class="tab" data-tab="habits">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Habits
      </button>
      <button type="button" class="tab" data-tab="data">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M8 11l4 4 4-4M5 21h14"/></svg>
        Data
      </button>
    </nav>
  </div>

  <input type="file" id="importInput" accept="application/json,.json" />
  <div class="toast" id="toast" role="status"></div>

  <script>
(function () {
  "use strict";

  const STORAGE_KEY = "habit-journal-v2";
  const STORAGE_BACKUP_KEY = "habit-journal-v2-backup";
  const STORAGE_LOCAL_BACKUP_KEY = "habit-journal-v2-local-backup";
  const STORAGE_META_KEY = "habit-journal-v2-meta";
  const STORAGE_KEY_LEGACY = "habit-journal-v1";
  let storageOk = true;
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const MONTHS_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const WEEKDAY_LETTERS = ["S", "M", "T", "W", "T", "F", "S"];
  const DEFAULT_CATEGORIES = [
    { id: "general", label: "General" },
    { id: "health", label: "Health" },
    { id: "fitness", label: "Fitness" },
    { id: "mind", label: "Mind" },
    { id: "work", label: "Work" },
    { id: "home", label: "Home" },
  ];
  const MAX_CATEGORIES = 20;
  const MAX_STEP = 5000;
  let monthGridScrollLeft = 0;
  let monthGridScrolledToToday = false;
  let yearExpandedHabits = {};
  let yearFullscreenHabitId = null;
  let habitsCatPanelOpen = false;

  /** 0 = empty, 1–5 = light → dark (5 = all-time high) */
  const GRADIENT = ["#ffffff", "#f8e8f0", "#efb8d0", "#e080a8", "#c94d78", "#7a1f45"];

  function defaultState() {
    return {
      version: 2,
      year: new Date().getFullYear(),
      month: new Date().getMonth(),
      categoryFilter: "all",
      categories: DEFAULT_CATEGORIES.map(function (c) {
        return { id: c.id, label: c.label };
      }),
      habits: [
        { id: uid(), name: "Steps", type: "counter", step: 5000, category: "fitness", pinned: false },
      ],
      cells: {},
    };
  }

  function cloneDefaultCategories() {
    return DEFAULT_CATEGORIES.map(function (c) {
      return { id: c.id, label: c.label };
    });
  }

  function categoryLabel(catId) {
    const c = (state.categories || []).find(function (x) { return x.id === catId; });
    return c ? c.label : "General";
  }

  function slugCategoryId(label) {
    const base = String(label || "")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "_")
      .replace(/^_|_$/g, "")
      .slice(0, 28);
    let id = base || "category";
    if (id === "general") id = "cat_custom";
    let n = 0;
    while ((state.categories || []).some(function (c) { return c.id === id; })) {
      n++;
      id = (base || "category") + "_" + n;
    }
    return id;
  }

  function normalizeCategory(cat, categories) {
    const list = categories || state.categories || DEFAULT_CATEGORIES;
    const id = String(cat || "general").toLowerCase();
    if (list.some(function (c) { return c.id === id; })) return id;
    return "general";
  }

  function ensureCategories() {
    if (!Array.isArray(state.categories) || !state.categories.length) {
      state.categories = cloneDefaultCategories();
    }
    const seen = {};
    state.categories = state.categories
      .map(function (c) {
        const id = String(c.id || "").toLowerCase() || "general";
        const label = String(c.label || id).slice(0, 32);
        if (seen[id]) return null;
        seen[id] = true;
        return { id: id, label: label };
      })
      .filter(Boolean);
    if (!state.categories.some(function (c) { return c.id === "general"; })) {
      state.categories.unshift({ id: "general", label: "General" });
    }
    state.habits.forEach(function (h) {
      const cat = h.category;
      if (cat && cat !== "general" && !state.categories.some(function (c) { return c.id === cat; })) {
        state.categories.push({ id: cat, label: cat.replace(/_/g, " ") });
      }
    });
    if (state.categoryFilter && state.categoryFilter !== "all") {
      if (!state.categories.some(function (c) { return c.id === state.categoryFilter; })) {
        state.categoryFilter = "all";
      }
    } else if (!state.categoryFilter) {
      state.categoryFilter = "all";
    }
  }

  function normalizeHabit(h, categories) {
    const base = {
      category: normalizeCategory(h.category, categories),
      pinned: !!h.pinned,
    };
    if (h.type === "yesno" || h.type === "counter") {
      const type = h.type;
      const step = Math.min(MAX_STEP, Math.max(1, parseInt(h.step, 10) || 1));
      return {
        id: h.id || uid(),
        name: String(h.name || "Habit").slice(0, 40),
        type: type,
        step: type === "counter" ? step : 1,
        category: base.category,
        pinned: base.pinned,
      };
    }
    const levels = Array.isArray(h.levels) ? h.levels : [];
    let type = "counter";
    if (levels.length && levels.length <= 3) {
      const blob = levels.map(function (l) { return String(l.label || "").toLowerCase(); }).join(" ");
      if (/yes|no|done|skip|miss|✓|✗/.test(blob)) type = "yesno";
    }
    const name = String(h.name || "Habit").slice(0, 40);
    if (/meditat|stretch|read|journal|floss|vitamin/i.test(name)) type = "yesno";
    return { id: h.id || uid(), name: name, type: type, step: 1, category: base.category, pinned: base.pinned };
  }

  function sortHabitsList(habits) {
    return habits.slice().sort(function (a, b) {
      if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
  }

  function getFilteredHabits() {
    let habits = state.habits;
    if (state.categoryFilter && state.categoryFilter !== "all") {
      habits = habits.filter(function (h) {
        return h.category === state.categoryFilter;
      });
    }
    return sortHabitsList(habits);
  }

  function renderCategoryFiltersHtml() {
    let html = '<div class="category-filters">';
    html +=
      '<button type="button" class="chip' +
      (state.categoryFilter === "all" ? " on" : "") +
      '" data-cat-filter="all">All</button>';
    state.categories.forEach(function (cat) {
      const count = state.habits.filter(function (h) { return h.category === cat.id; }).length;
      if (count === 0 && state.categoryFilter !== cat.id) return;
      html +=
        '<button type="button" class="chip' +
        (state.categoryFilter === cat.id ? " on" : "") +
        '" data-cat-filter="' +
        escapeHtml(cat.id) +
        '">' +
        escapeHtml(cat.label) +
        (count ? " (" + count + ")" : "") +
        "</button>";
    });
    html += "</div>";
    return html;
  }

  function bindCategoryFilters(root) {
    if (!root) return;
    root.querySelectorAll("[data-cat-filter]").forEach(function (btn) {
      btn.onclick = function () {
        state.categoryFilter = btn.getAttribute("data-cat-filter");
        save();
        render();
      };
    });
  }

  function isYearHabitExpanded(habitId) {
    return !!yearExpandedHabits[habitId];
  }

  function setYearHabitExpanded(habitId, open) {
    if (open) yearExpandedHabits[habitId] = true;
    else {
      delete yearExpandedHabits[habitId];
      if (yearFullscreenHabitId === habitId) closeYearFullscreen();
    }
  }

  function expandAllYearHabits(habits) {
    habits.forEach(function (h) {
      yearExpandedHabits[h.id] = true;
    });
  }

  function collapseAllYearHabits() {
    yearExpandedHabits = {};
    closeYearFullscreen();
  }

  function yearHabitFullscreenTitle(habit) {
    let title = habit.name;
    if (habit.type === "counter") {
      title += " (" + formatStepBracket(habit.step) + ")";
    }
    return title;
  }

  function renderYearGridCard(habit) {
    const expanded = isYearHabitExpanded(habit.id);
    let html =
      '<article class="year-grid-card' +
      (habit.pinned ? " pin" : "") +
      (expanded ? " is-expanded" : " is-collapsed") +
      '" data-habit-id="' +
      escapeHtml(habit.id) +
      '">';
    html +=
      '<button type="button" class="year-grid-card-head" data-year-toggle="' +
      escapeHtml(habit.id) +
      '" aria-expanded="' +
      expanded +
      '">';
    html += '<span class="year-caret" aria-hidden="true">▶</span>';
    html += '<span class="year-grid-card-title">' + escapeHtml(habit.name) + "</span>";
    html += "</button>";
    if (expanded) {
      html += '<div class="year-grid-card-body">';
      html +=
        '<button type="button" class="year-grid-card-open-fs" data-year-open-fs="' +
        escapeHtml(habit.id) +
        '" aria-label="Open ' +
        escapeHtml(habit.name) +
        ' full screen">';
      html += buildYearHeatmapHtml(habit);
      html += renderLegendCompact(habit);
      html += "</button></div>";
    }
    html += "</article>";
    return html;
  }

  function renderYearGridHtml(habits) {
    if (!habits.length) {
      return '<p class="month-empty">No habits in this category.</p>';
    }
    let html = '<div class="year-grid-3">';
    habits.forEach(function (habit) {
      html += renderYearGridCard(habit);
    });
    html += "</div>";
    return html;
  }

  function bindYearGrid(root) {
    root.querySelectorAll("[data-year-toggle]").forEach(function (btn) {
      btn.onclick = function (e) {
        e.stopPropagation();
        const id = btn.getAttribute("data-year-toggle");
        const card = btn.closest(".year-grid-card");
        if (card && card.classList.contains("is-expanded")) {
          setYearHabitExpanded(id, false);
        } else {
          setYearHabitExpanded(id, true);
        }
        renderYear();
      };
    });
    root.querySelectorAll("[data-year-open-fs]").forEach(function (btn) {
      btn.onclick = function (e) {
        e.stopPropagation();
        openYearFullscreen(btn.getAttribute("data-year-open-fs"));
      };
    });
  }

  function parseLevelLabelValue(label) {
    const m = String(label || "").match(/(\d+(?:\.\d+)?)/);
    return m ? parseFloat(m[1]) : NaN;
  }

  function migrateCellValue(habit, levelIndex, legacyLevels) {
    if (levelIndex == null || levelIndex <= 0) return null;
    if (habit.type === "yesno") {
      if (levelIndex >= (legacyLevels && legacyLevels.length ? legacyLevels.length - 1 : 2)) return 1;
      return levelIndex === 1 ? 1 : 0;
    }
    if (legacyLevels && legacyLevels[levelIndex]) {
      const n = parseLevelLabelValue(legacyLevels[levelIndex].label);
      if (!isNaN(n) && n > 0) return n;
    }
    return levelIndex * 10;
  }

  function uid() {
    return "h" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  function storageAvailable() {
    try {
      const t = "__hj_w__";
      localStorage.setItem(t, "1");
      localStorage.removeItem(t);
      return true;
    } catch (e) {
      return false;
    }
  }

  function showStorageBanner(msg) {
    const el = document.getElementById("storageBanner");
    if (!el) return;
    el.textContent = msg;
    el.classList.add("show");
  }

  function loadState() {
    try {
      let raw = localStorage.getItem(STORAGE_KEY);
      let recoveredFrom = null;
      if (!raw) {
        raw = localStorage.getItem(STORAGE_LOCAL_BACKUP_KEY);
        if (raw) recoveredFrom = "local";
      }
      if (!raw) {
        raw = sessionStorage.getItem(STORAGE_BACKUP_KEY);
        if (raw) recoveredFrom = "session";
      }
      if (!raw) raw = localStorage.getItem(STORAGE_KEY_LEGACY);
      if (!raw) return defaultState();
      if (recoveredFrom) {
        try {
          localStorage.setItem(STORAGE_KEY, raw);
        } catch (e) { /* ok */ }
      }
      const p = JSON.parse(raw);
      if (!p || !Array.isArray(p.habits)) return defaultState();
      const s = defaultState();
      s.year = typeof p.year === "number" ? p.year : s.year;
      s.month = typeof p.month === "number" ? Math.min(11, Math.max(0, p.month)) : s.month;
      s.cells = {};
      if (p.cells && typeof p.cells === "object") {
        Object.keys(p.cells).forEach(function (k) {
          const v = p.cells[k];
          if (typeof v === "number") s.cells[k] = v;
        });
      }
      if (Array.isArray(p.categories) && p.categories.length) {
        s.categories = p.categories.map(function (c) {
          return { id: String(c.id || "general").toLowerCase(), label: String(c.label || "Category").slice(0, 32) };
        });
      } else {
        s.categories = cloneDefaultCategories();
      }
      s.categoryFilter = typeof p.categoryFilter === "string" ? p.categoryFilter : "all";
      const legacyHabits = p.habits.slice();
      s.habits = legacyHabits.map(function (h) {
        return normalizeHabit(h, s.categories);
      });
      if (!s.habits.length) s.habits = defaultState().habits;
      const isLegacy = p.version !== 2 || legacyHabits.some(function (h) { return h && h.levels; });
      if (isLegacy) {
        try {
          legacyHabits.forEach(function (oldH, i) {
            const nh = s.habits[i];
            if (!nh || !oldH || !oldH.levels) return;
            Object.keys(s.cells).forEach(function (k) {
              if (k.indexOf(nh.id + "-") !== 0) return;
              const idx = s.cells[k];
              if (typeof idx !== "number" || idx < 1) return;
              const v = migrateCellValue(nh, idx, oldH.levels);
              if (v == null) delete s.cells[k];
              else s.cells[k] = v;
            });
          });
          localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({
              version: 2,
              year: s.year,
              month: s.month,
              habits: s.habits,
              cells: s.cells,
              categories: s.categories,
              categoryFilter: s.categoryFilter,
            })
          );
        } catch (e) { /* migration optional */ }
      }
      if (recoveredFrom) window.__hjRecoveredFrom = recoveredFrom;
      return s;
    } catch (e) {
      return defaultState();
    }
  }

  function writeMeta() {
    try {
      localStorage.setItem(
        STORAGE_META_KEY,
        JSON.stringify({
          lastSavedAt: Date.now(),
          habits: state.habits.length,
          marks: Object.keys(state.cells).length,
        })
      );
    } catch (e) { /* ok */ }
  }

  function readMeta() {
    try {
      const raw = localStorage.getItem(STORAGE_META_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  function formatSavedWhen(ts) {
    if (!ts) return "not yet";
    const sec = Math.floor((Date.now() - ts) / 1000);
    if (sec < 10) return "just now";
    if (sec < 60) return sec + " sec ago";
    if (sec < 3600) return Math.floor(sec / 60) + " min ago";
    if (sec < 86400) return Math.floor(sec / 3600) + " hr ago";
    return new Date(ts).toLocaleString();
  }

  function clearAllStorage() {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_LOCAL_BACKUP_KEY);
    localStorage.removeItem(STORAGE_META_KEY);
    localStorage.removeItem(STORAGE_KEY_LEGACY);
    sessionStorage.removeItem(STORAGE_BACKUP_KEY);
  }

  let state = loadState();
  let activeTab = "month";
  let eraserMode = false;

  function ensureHabitsReady() {
    ensureCategories();
    if (!Array.isArray(state.habits) || !state.habits.length) {
      state.habits = defaultState().habits;
      save();
    }
    state.habits = state.habits.map(function (h) {
      var n = normalizeHabit(h || {}, state.categories);
      if (n.type === "counter" && !n.step) n.step = 1;
      return n;
    });
    migrateLegacyFactoryHabits();
  }

  function showFatalError(msg) {
    var html = '<div class="card"><p class="hint">' + escapeHtml(msg) + "</p></div>";
    ["panelMonth", "panelYear", "panelHabits", "panelData"].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.innerHTML = html;
    });
  }

  function save() {
    if (!storageOk) {
      toast("Saving disabled — use Safari, not Private mode");
      return false;
    }
    const json = JSON.stringify(state);
    try {
      localStorage.setItem(STORAGE_KEY, json);
      localStorage.setItem(STORAGE_LOCAL_BACKUP_KEY, json);
      sessionStorage.setItem(STORAGE_BACKUP_KEY, json);
      writeMeta();
      return true;
    } catch (e) {
      try {
        sessionStorage.setItem(STORAGE_BACKUP_KEY, json);
        toast("Saved to session only — check storage");
      } catch (e2) {
        toast("Could not save");
      }
      return false;
    }
  }

  function flushSave() {
    save();
  }

  function toast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { el.classList.remove("show"); }, 2200);
  }

  function cellKey(habitId, y, m, d) {
    const mm = String(m + 1).padStart(2, "0");
    const dd = String(d).padStart(2, "0");
    return habitId + "-" + y + "-" + mm + "-" + dd;
  }

  function daysInMonth(y, m) {
    return new Date(y, m + 1, 0).getDate();
  }

  function getCellValue(key) {
    const v = state.cells[key];
    return typeof v === "number" ? v : null;
  }

  function getAllTimeHigh(habitId) {
    const habit = state.habits.find(function (h) { return h.id === habitId; });
    if (!habit) return 0;
    if (habit.type === "yesno") return 1;
    let max = 0;
    const prefix = habitId + "-";
    Object.keys(state.cells).forEach(function (k) {
      if (k.indexOf(prefix) !== 0) return;
      const v = state.cells[k];
      if (typeof v === "number" && v > max) max = v;
    });
    return max;
  }

  function valueToBucket(habit, value, high) {
    if (value === null || value === undefined) return 0;
    if (habit.type === "yesno") {
      if (value >= 1) return 5;
      if (value === 0) return 2;
      return 0;
    }
    if (value <= 0) return 0;
    high = Math.max(high, habit.step || 1, 1);
    const bucket = Math.round((value / high) * 5);
    return Math.min(5, Math.max(1, bucket));
  }

  function bucketThresholdLabel(habit, bucket, high) {
    if (bucket === 0) return "0";
    if (habit.type === "yesno") return bucket >= 5 ? "Yes" : "No";
    if (!high) return String(bucket);
    return String(Math.round((high * bucket) / 5));
  }

  function cellStyle(habit, value) {
    const high = getAllTimeHigh(habit.id);
    const b = valueToBucket(habit, value, high);
    let style = "background:" + GRADIENT[b] + ";border-color:" + (b === 0 ? "var(--border)" : "transparent");
    if (b === 5) style += ";color:#fff";
    return style;
  }

  function formatCounterDisplay(value) {
    const v = Math.round(value);
    if (v >= 1000) return String(Math.round(v / 1000)) + "k";
    return String(v);
  }

  function formatStepBracket(step) {
    const n = Math.round(step || 1);
    if (n >= 1000) return n.toLocaleString("en-US");
    return String(n);
  }

  function habitMonthLabelHtml(habit) {
    let html = (habit.pinned ? "★ " : "") + escapeHtml(habit.name);
    if (habit.type === "counter") {
      html += '<span class="habit-label-step">(' + escapeHtml(formatStepBracket(habit.step)) + ")</span>";
    }
    return html;
  }

  function migrateLegacyFactoryHabits() {
    if (state.migratedStepsDefault) return;
    const habits = state.habits || [];
    const running = habits.find(function (h) {
      return /^running$/i.test(String(h.name || "").trim());
    });
    const meditation = habits.find(function (h) {
      return /^meditation$/i.test(String(h.name || "").trim());
    });
    const marks = Object.keys(state.cells || {}).length;
    if (habits.length === 2 && running && meditation && marks === 0) {
      state.habits = defaultState().habits.map(function (h) {
        return normalizeHabit(h, state.categories);
      });
      state.migratedStepsDefault = true;
      save();
      return;
    }
    if (habits.length === 1 && running && marks === 0) {
      state.habits = defaultState().habits.map(function (h) {
        return normalizeHabit(h, state.categories);
      });
      state.migratedStepsDefault = true;
      save();
      return;
    }
    if (running && (!meditation || habits.length <= 2)) {
      running.name = "Steps";
      running.type = "counter";
      running.step = 5000;
      running.category = running.category || "fitness";
      if (meditation) {
        const medPrefix = meditation.id + "-";
        const medMarks = Object.keys(state.cells).filter(function (k) {
          return k.indexOf(medPrefix) === 0;
        }).length;
        if (!medMarks) {
          state.habits = habits.filter(function (h) {
            return h.id !== meditation.id;
          });
        }
      }
      state.migratedStepsDefault = true;
      save();
    }
  }

  function cellDisplay(habit, value) {
    if (value === null || value === undefined) return { text: "", cls: "" };
    if (habit.type === "yesno") {
      if (value >= 1) return { text: "✓", cls: "cell-yes" };
      if (value === 0) return { text: "✗", cls: "cell-yes" };
    }
    if (value > 0) return { text: formatCounterDisplay(value), cls: "cell-count" };
    return { text: "", cls: "" };
  }

  function isTodayColumn(y, m, d) {
    const t = new Date();
    return y === t.getFullYear() && m === t.getMonth() && d === t.getDate();
  }

  function refreshCellButton(btn) {
    if (!btn || !btn.dataset.key) return;
    const p = btn.dataset.key.split("|");
    const habit = state.habits.find(function (h) { return h.id === p[0]; });
    if (!habit) return;
    const y = parseInt(p[1], 10);
    const mo = parseInt(p[2], 10);
    const d = parseInt(p[3], 10);
    const value = getCellValue(cellKey(habit.id, y, mo, d));
    const disp = cellDisplay(habit, value);
    const todayCls = isTodayColumn(y, mo, d) ? " col-today" : "";
    btn.className = ("cell " + disp.cls + todayCls).trim();
    btn.style.cssText = cellStyle(habit, value);
    btn.textContent = disp.text;
    btn.setAttribute("aria-label", habit.name + " " + (value != null ? value : "empty"));
  }

  function afterCellChange(habitId, y, m, d) {
    save();
    const key = habitId + "|" + y + "|" + m + "|" + d;
    const btn =
      document.querySelector('#yearFsBody .cell[data-key="' + key + '"]') ||
      document.querySelector('#panelYear .cell[data-key="' + key + '"]') ||
      document.querySelector('#panelMonth .cell[data-key="' + key + '"]');
    if (btn) {
      refreshCellButton(btn);
      if (activeTab === "month") return;
      if (activeTab === "year" && yearFullscreenHabitId) return;
    }
    if (activeTab === "month") {
      renderMonth();
      return;
    }
    if (activeTab === "year") {
      renderYear();
      return;
    }
    render();
  }

  function buildYearHeatmapHtml(habit) {
    let html = '<div class="year-grid-heatmap" role="img" aria-label="' + escapeHtml(habit.name) + ' year">';
    for (let d = 1; d <= 31; d++) {
      for (let m = 0; m < 12; m++) {
        const dim = daysInMonth(state.year, m);
        if (d > dim) {
          html += '<span class="cell cell-pad" aria-hidden="true"></span>';
        } else {
          html += renderCellButton(habit, state.year, m, d);
        }
      }
    }
    html += "</div>";
    return html;
  }

  function openYearFullscreen(habitId) {
    const habit = state.habits.find(function (h) { return h.id === habitId; });
    if (!habit) return;
    yearFullscreenHabitId = habitId;
    document.getElementById("yearFsTitle").textContent = yearHabitFullscreenTitle(habit);
    document.getElementById("yearFsYear").textContent = String(state.year);
    const body = document.getElementById("yearFsBody");
    body.innerHTML = buildYearHeatmapHtml(habit) + renderLegendCompact(habit);
    body.querySelectorAll(".year-grid-heatmap .cell").forEach(function (cell) {
      cell.style.pointerEvents = "auto";
      cell.style.cursor = "pointer";
    });
    document.getElementById("yearFullscreen").hidden = false;
    document.body.classList.add("year-fs-open");
    bindCells(body);
  }

  function closeYearFullscreen() {
    yearFullscreenHabitId = null;
    const overlay = document.getElementById("yearFullscreen");
    if (overlay) overlay.hidden = true;
    document.body.classList.remove("year-fs-open");
  }

  function tapCell(habitId, y, m, d) {
    const habit = state.habits.find(function (h) { return h.id === habitId; });
    if (!habit) return;
    const key = cellKey(habitId, y, m, d);
    const v = getCellValue(key);
    if (habit.type === "yesno") {
      if (v === null) state.cells[key] = 1;
      else if (v === 1) state.cells[key] = 0;
      else delete state.cells[key];
    } else {
      const step = habit.step || 1;
      const next = (v || 0) + step;
      state.cells[key] = next;
    }
    afterCellChange(habitId, y, m, d);
  }

  function eraseCell(habitId, y, m, d) {
    const habit = state.habits.find(function (h) { return h.id === habitId; });
    if (!habit) return;
    const key = cellKey(habitId, y, m, d);
    const v = getCellValue(key);
    if (v === null) return;
    if (habit.type === "yesno") {
      if (v === 1) state.cells[key] = 0;
      else delete state.cells[key];
    } else {
      const step = habit.step || 1;
      const next = v - step;
      if (next <= 0) delete state.cells[key];
      else state.cells[key] = next;
    }
    afterCellChange(habitId, y, m, d);
  }

  function decrementCell(habitId, y, m, d) {
    eraseCell(habitId, y, m, d);
  }

  function setEraserMode(on) {
    eraserMode = !!on;
    updateModeBar();
    if (eraserMode) toast("Eraser on — tap a cell to subtract or clear");
    else toast("Mark mode — tap to add");
  }

  function syncModeButtons() {
    document.querySelectorAll("[data-mode-action]").forEach(function (btn) {
      const isEraser = btn.getAttribute("data-mode-action") === "eraser";
      btn.classList.toggle("on", isEraser ? eraserMode : !eraserMode);
      btn.setAttribute("aria-pressed", String(isEraser ? eraserMode : !eraserMode));
    });
  }

  function updateModeBar() {
    const bar = document.getElementById("modeBar");
    if (!bar) return;
    const show = activeTab === "month" || activeTab === "year";
    bar.hidden = !show;
    document.body.classList.toggle("has-mode-bar", show);
    syncModeButtons();
  }

  function renderTopNav() {
    const nav = document.getElementById("topNav");
    if (!nav) return;
    if (activeTab === "habits" || activeTab === "data") {
      nav.innerHTML = '<span class="nav-label">' + state.year + "</span>";
      return;
    }
    if (activeTab === "year") {
      nav.innerHTML =
        '<button type="button" class="nav-btn" id="yearPrev" aria-label="Previous year">‹</button>' +
        '<span class="nav-label">' + state.year + "</span>" +
        '<button type="button" class="nav-btn" id="yearNext" aria-label="Next year">›</button>';
      document.getElementById("yearPrev").onclick = function () { state.year--; save(); render(); };
      document.getElementById("yearNext").onclick = function () { state.year++; save(); render(); };
      return;
    }
    nav.innerHTML =
      '<button type="button" class="nav-btn" id="monthPrev" aria-label="Previous month">‹</button>' +
      '<span class="nav-label">' + MONTHS_FULL[state.month] + " " + state.year + "</span>" +
      '<button type="button" class="nav-btn" id="monthNext" aria-label="Next month">›</button>';
    document.getElementById("monthPrev").onclick = function () {
      state.month--;
      if (state.month < 0) { state.month = 11; state.year--; }
      monthGridScrollLeft = 0;
      monthGridScrolledToToday = false;
      save(); render();
    };
    document.getElementById("monthNext").onclick = function () {
      state.month++;
      if (state.month > 11) { state.month = 0; state.year++; }
      monthGridScrollLeft = 0;
      monthGridScrolledToToday = false;
      save(); render();
    };
  }

  function renderLegendCompact(habit) {
    const high = Math.max(getAllTimeHigh(habit.id), habit.type === "counter" ? (habit.step || 1) : 1);
    const buckets = habit.type === "yesno" ? [0, 2, 5] : [0, 3, 5];
    let html = '<div class="legend-scale legend-compact">';
    buckets.forEach(function (b) {
      html += '<div class="legend-item-compact">';
      html += '<span class="legend-swatch" style="background:' + GRADIENT[b] + '"></span>';
      html += "<span>" + escapeHtml(bucketThresholdLabel(habit, b, high)) + "</span></div>";
    });
    html += "</div>";
    if (habit.type === "counter") {
      html +=
        '<p class="legend-high-note">High: <strong>' +
        escapeHtml(formatCounterDisplay(high)) +
        "</strong></p>";
    }
    return html;
  }

  function renderLegend(habit) {
    let html = renderLegendCompact(habit);
    if (habit.type === "counter") {
      html += "<p style=\"font-size:0.6875rem;color:var(--muted);margin-top:6px\">Mark: tap +step. Eraser or hold: -step</p>";
    } else {
      html += "<p style=\"font-size:0.6875rem;color:var(--muted);margin-top:6px\">Tap: empty, Yes, No, clear. Eraser steps back.</p>";
    }
    return html;
  }

  function renderCellButton(habit, y, m, d, extraClass) {
    const key = cellKey(habit.id, y, m, d);
    const value = getCellValue(key);
    const disp = cellDisplay(habit, value);
    const dataKey = habit.id + "|" + y + "|" + m + "|" + d;
    const todayCls = isTodayColumn(y, m, d) ? " col-today" : "";
    const cls = "cell " + disp.cls + todayCls + (extraClass || "");
    const counterAttr = habit.type === "counter" ? ' data-counter="1"' : "";
    return (
      '<button type="button" class="' + cls.trim() + '" data-key="' + dataKey + '"' + counterAttr + ' style="' + cellStyle(habit, value) + '" aria-label="' +
      escapeHtml(habit.name) + " " + (value != null ? value : "empty") + '">' + escapeHtml(disp.text) + "</button>"
    );
  }

  function bindCells(root) {
    root.querySelectorAll(".cell[data-key]").forEach(function (btn) {
      let holdTimer = null;
      let held = false;
      btn.onclick = function () {
        if (held) { held = false; return; }
        const p = btn.dataset.key.split("|");
        if (eraserMode) eraseCell(p[0], parseInt(p[1], 10), parseInt(p[2], 10), parseInt(p[3], 10));
        else tapCell(p[0], parseInt(p[1], 10), parseInt(p[2], 10), parseInt(p[3], 10));
      };
      if (btn.dataset.counter && !eraserMode) {
        btn.addEventListener("touchstart", function () {
          held = false;
          holdTimer = setTimeout(function () {
            held = true;
            const p = btn.dataset.key.split("|");
            decrementCell(p[0], parseInt(p[1], 10), parseInt(p[2], 10), parseInt(p[3], 10));
          }, 450);
        }, { passive: true });
        btn.addEventListener("touchend", function () { clearTimeout(holdTimer); });
        btn.addEventListener("touchcancel", function () { clearTimeout(holdTimer); });
        btn.addEventListener("contextmenu", function (e) {
          e.preventDefault();
          held = true;
          const p = btn.dataset.key.split("|");
          decrementCell(p[0], parseInt(p[1], 10), parseInt(p[2], 10), parseInt(p[3], 10));
        });
      }
    });
  }

  function renderMonth() {
    const root = document.getElementById("panelMonth");
    if (!root) return;
    const prevScroller = root.querySelector(".scroll-x");
    if (prevScroller) monthGridScrollLeft = prevScroller.scrollLeft;

    const dim = daysInMonth(state.year, state.month);
    let cols = "92px";
    for (let d = 1; d <= dim; d++) cols += " 28px";

    const eraserNote = eraserMode ? " Eraser on — tap a cell to subtract." : "";
    const filtered = getFilteredHabits();
    let html = renderCategoryFiltersHtml();
    html += '<p class="hint">Mark or Eraser in the bar below.' + eraserNote + " Hold a counter cell to subtract.</p>";
    if (!filtered.length) {
      html += '<p class="month-empty">No habits in this category. Change the filter or assign habits on the Habits tab.</p>';
      root.innerHTML = html;
      bindCategoryFilters(root);
      return;
    }
    html += '<div class="card scroll-x month-scroll"><div class="month-grid" style="grid-template-columns:' + cols + '">';
    html += '<div class="corner"></div>';
    for (let d = 1; d <= dim; d++) {
      const dow = WEEKDAY_LETTERS[new Date(state.year, state.month, d).getDay()];
      const todayCls = isTodayColumn(state.year, state.month, d) ? " is-today" : "";
      html += '<div class="day-head' + todayCls + '"><span class="day-num">' + d + '</span><span class="day-dow">' + dow + "</span></div>";
    }

    filtered.forEach(function (habit) {
      html += '<div class="habit-label">' + habitMonthLabelHtml(habit) + "</div>";
      for (let d = 1; d <= dim; d++) {
        html += renderCellButton(habit, state.year, state.month, d);
      }
    });

    html += "</div></div>";
    root.innerHTML = html;
    bindCategoryFilters(root);
    bindCells(root);

    const scroller = root.querySelector(".scroll-x");
    if (scroller) {
      scroller.scrollLeft = monthGridScrollLeft;
      if (!monthGridScrolledToToday) {
        const todayHead = scroller.querySelector(".day-head.is-today");
        if (todayHead) {
          monthGridScrolledToToday = true;
          const grid = scroller.querySelector(".month-grid");
          const offset = todayHead.offsetLeft - (scroller.clientWidth - todayHead.offsetWidth) / 2;
          scroller.scrollLeft = Math.max(0, offset - 92);
        }
      }
    }
  }

  function renderYear() {
    const root = document.getElementById("panelYear");
    if (!root) return;
    const filtered = getFilteredHabits();
    const allExpanded =
      filtered.length > 0 &&
      filtered.every(function (h) {
        return isYearHabitExpanded(h.id);
      });
    const anyExpanded = filtered.some(function (h) {
      return isYearHabitExpanded(h.id);
    });
    const eraserNote = eraserMode ? " Eraser on — tap cells to subtract or clear." : "";
    let html = '<div class="year-toolbar">';
    html +=
      '<button type="button" class="btn btn-secondary" id="yearExpandAll" aria-pressed="' +
      allExpanded +
      '">Expand all</button>';
    html +=
      '<button type="button" class="btn btn-secondary" id="yearCollapseAll" aria-pressed="' +
      !anyExpanded +
      '">Collapse all</button>';
    html += "</div>";
    html += renderCategoryFiltersHtml();
    html +=
      '<p class="hint">3 across · tap name to expand · tap colors for full screen · Mark/Eraser below' +
      eraserNote +
      "</p>";
    html += renderYearGridHtml(filtered);
    root.innerHTML = html;
    bindCategoryFilters(root);
    bindYearGrid(root);

    document.getElementById("yearExpandAll").onclick = function () {
      expandAllYearHabits(filtered);
      renderYear();
    };
    document.getElementById("yearCollapseAll").onclick = function () {
      collapseAllYearHabits();
      renderYear();
    };
  }

  function renderHabits() {
    const root = document.getElementById("panelHabits");
    let html =
      '<div class="habits-cat-bar' +
      (habitsCatPanelOpen ? " is-open" : "") +
      '"><button type="button" class="habits-cat-toggle" id="habitsCatToggle" aria-expanded="' +
      habitsCatPanelOpen +
      '"><span class="habits-caret" aria-hidden="true">▶</span>Categories</button></div>';
    html += '<div class="habits-cat-panel" id="habitsCatPanel">';
    state.categories.forEach(function (cat) {
      const count = state.habits.filter(function (h) { return h.category === cat.id; }).length;
      html +=
        '<div class="category-manage-row" data-cat-row="' +
        escapeHtml(cat.id) +
        '">' +
        '<input type="text" value="' +
        escapeHtml(cat.label) +
        '" data-cat-label="' +
        escapeHtml(cat.id) +
        '" maxlength="32" ' +
        (cat.id === "general" ? "readonly" : "") +
        " />" +
        '<button type="button" class="btn btn-danger" data-cat-del="' +
        escapeHtml(cat.id) +
        '"' +
        (cat.id === "general" ? " disabled" : "") +
        ">Delete</button>" +
        (count ? '<span style="font-size:0.75rem;color:var(--muted)">' + count + " habit" + (count === 1 ? "" : "s") + "</span>" : "") +
        "</div>";
    });
    html +=
      '<div class="add-cat-row"><input type="text" id="newCategoryName" placeholder="New category" maxlength="32" />' +
      '<button type="button" class="btn btn-primary" id="addCategory">Add</button></div></div>';
    html += '<p class="hint">Pin ★ favorites (shown first). Counter shows + per tap on the Habits tab.</p>';

    sortHabitsList(state.habits).forEach(function (habit) {
      html += '<div class="card" data-habit="' + habit.id + '">';
      html += '<div class="habit-row">';
      html += '<input type="text" value="' + escapeHtml(habit.name) + '" data-name="' + habit.id + '" maxlength="40" />';
      html += '<button type="button" class="btn btn-danger" data-del="' + habit.id + '">Remove</button></div>';
      html += '<div class="habit-meta-row">';
      html += '<select class="habit-cat-select" data-cat="' + habit.id + '">';
      state.categories.forEach(function (cat) {
        html += '<option value="' + cat.id + '"' + (habit.category === cat.id ? " selected" : "") + ">" + escapeHtml(cat.label) + "</option>";
      });
      html += "</select>";
      html += '<button type="button" class="habit-pin-btn' + (habit.pinned ? " on" : "") + '" data-pin="' + habit.id + '">' + (habit.pinned ? "★ Pinned" : "☆ Pin") + "</button>";
      html += "</div>";
      html += '<div class="habit-settings">';
      html += '<div class="type-row">';
      html += '<button type="button" class="type-pill' + (habit.type === "counter" ? " on" : "") + '" data-type="counter" data-hid="' + habit.id + '">Counter</button>';
      html += '<button type="button" class="type-pill' + (habit.type === "yesno" ? " on" : "") + '" data-type="yesno" data-hid="' + habit.id + '">Yes / No</button>';
      html += "</div>";
      if (habit.type === "counter") {
        html +=
          '<div class="step-row"><span>+ per tap</span><input type="number" min="1" max="' +
          MAX_STEP +
          '" value="' +
          habit.step +
          '" data-step="' +
          habit.id +
          '" /><span class="hint" style="margin:0">max ' +
          MAX_STEP +
          "</span></div>";
      }
      html += '<div class="legend">' + renderLegend(habit) + "</div>";
      html += "</div></div>";
    });

    html += '<div class="add-habit-row">';
    html += '<input type="text" id="newHabitName" placeholder="New habit name" maxlength="40" />';
    html += '<select id="newHabitCategory" aria-label="Category">';
    state.categories.forEach(function (cat) {
      html += '<option value="' + cat.id + '">' + escapeHtml(cat.label) + "</option>";
    });
    html += '</select><button type="button" class="btn btn-primary" id="addHabit">Add</button></div>';
    root.innerHTML = html;

    document.getElementById("habitsCatToggle").onclick = function () {
      habitsCatPanelOpen = !habitsCatPanelOpen;
      renderHabits();
    };

    document.getElementById("addCategory").onclick = function () {
      const inp = document.getElementById("newCategoryName");
      const label = (inp && inp.value.trim()) || "";
      if (!label) {
        toast("Enter a category name");
        return;
      }
      if (state.categories.length >= MAX_CATEGORIES) {
        toast("Maximum " + MAX_CATEGORIES + " categories");
        return;
      }
      const id = slugCategoryId(label);
      if (state.categories.some(function (c) { return c.label.toLowerCase() === label.toLowerCase(); })) {
        toast("Category already exists");
        return;
      }
      state.categories.push({ id: id, label: label.slice(0, 32) });
      if (inp) inp.value = "";
      save();
      toast("Added " + label);
      render();
    };
    const newCatInp = document.getElementById("newCategoryName");
    if (newCatInp) {
      newCatInp.onkeydown = function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          document.getElementById("addCategory").click();
        }
      };
    }

    root.querySelectorAll("[data-cat-label]").forEach(function (inp) {
      if (inp.readOnly) return;
      function syncLabel() {
        const id = inp.getAttribute("data-cat-label");
        const cat = state.categories.find(function (c) { return c.id === id; });
        if (!cat) return;
        const label = inp.value.trim().slice(0, 32) || cat.label;
        cat.label = label;
        inp.value = label;
        save();
      }
      inp.onchange = syncLabel;
      inp.onblur = syncLabel;
    });

    root.querySelectorAll("[data-cat-del]").forEach(function (btn) {
      btn.onclick = function () {
        const id = btn.getAttribute("data-cat-del");
        if (!id || id === "general") return;
        const count = state.habits.filter(function (h) { return h.category === id; }).length;
        if (count) {
          if (!confirm(count + " habit(s) use this category. Move them to General and delete category?")) return;
          state.habits.forEach(function (h) {
            if (h.category === id) h.category = "general";
          });
        } else if (!confirm("Delete category \"" + categoryLabel(id) + "\"?")) {
          return;
        }
        state.categories = state.categories.filter(function (c) { return c.id !== id; });
        if (state.categoryFilter === id) state.categoryFilter = "all";
        save();
        render();
      };
    });

    function addNewHabit() {
      const inp = document.getElementById("newHabitName");
      const name = (inp && inp.value.trim()) || "New habit";
      const catEl = document.getElementById("newHabitCategory");
      const cat = catEl ? normalizeCategory(catEl.value) : "general";
      state.habits.push({ id: uid(), name: name.slice(0, 40), type: "counter", step: 1, category: cat, pinned: false });
      if (inp) inp.value = "";
      if (!save()) return;
      toast("Added " + name);
      render();
    }

    document.getElementById("addHabit").onclick = addNewHabit;
    const newInp = document.getElementById("newHabitName");
    if (newInp) {
      newInp.onkeydown = function (e) {
        if (e.key === "Enter") { e.preventDefault(); addNewHabit(); }
      };
    }

    root.querySelectorAll("[data-del]").forEach(function (btn) {
      btn.onclick = function () {
        if (state.habits.length <= 1) { toast("Keep at least one habit"); return; }
        if (!confirm("Remove this habit and all its dots?")) return;
        const id = btn.dataset.del;
        state.habits = state.habits.filter(function (h) { return h.id !== id; });
        Object.keys(state.cells).forEach(function (k) {
          if (k.indexOf(id + "-") === 0) delete state.cells[k];
        });
        save(); render();
      };
    });

    root.querySelectorAll("[data-name]").forEach(function (inp) {
      function syncName() {
        const h = state.habits.find(function (x) { return x.id === inp.dataset.name; });
        if (h) { h.name = inp.value.trim() || "Habit"; save(); }
      }
      inp.onchange = syncName;
      inp.onblur = syncName;
    });

    root.querySelectorAll(".type-pill").forEach(function (btn) {
      btn.onclick = function () {
        const h = state.habits.find(function (x) { return x.id === btn.dataset.hid; });
        if (!h) return;
        h.type = btn.dataset.type;
        if (h.type === "counter" && !h.step) h.step = 1;
        save(); render();
      };
    });

    root.querySelectorAll("[data-step]").forEach(function (inp) {
      inp.onchange = function () {
        const h = state.habits.find(function (x) { return x.id === inp.dataset.step; });
        if (h) {
          h.step = Math.min(MAX_STEP, Math.max(1, parseInt(inp.value, 10) || 1));
          save(); render();
        }
      };
    });

    root.querySelectorAll("[data-cat]").forEach(function (sel) {
      sel.onchange = function () {
        const h = state.habits.find(function (x) { return x.id === sel.dataset.cat; });
        if (h) {
          h.category = normalizeCategory(sel.value);
          save(); render();
        }
      };
    });

    root.querySelectorAll("[data-pin]").forEach(function (btn) {
      btn.onclick = function () {
        const h = state.habits.find(function (x) { return x.id === btn.dataset.pin; });
        if (h) {
          h.pinned = !h.pinned;
          save(); render();
        }
      };
    });
  }

  function renderData() {
    const root = document.getElementById("panelData");
    const meta = readMeta() || {};
    const marks = Object.keys(state.cells).length;
    root.innerHTML =
      '<div class="data-status">' +
      "<strong>Your data is saved on this phone.</strong> " +
      "Reloading the app or pushing updates does <em>not</em> erase habits — only Reset or clearing Safari website data does." +
      '<p class="meta">' + state.habits.length + " habits · " + marks + " marked days · last saved " +
      escapeHtml(formatSavedWhen(meta.lastSavedAt)) + " · auto-backup on every change</p></div>" +
      '<p class="hint">For peace of mind, export a JSON file occasionally (Files, email, or AirDrop). You can also use Export all on the Apps home screen. Import accepts this file or a full backup.</p>' +
      '<div class="card">' +
      '<button type="button" class="btn btn-primary btn-block" id="btnExport">Export backup (JSON)</button>' +
      '<button type="button" class="btn btn-secondary btn-block" id="btnImport">Import backup (JSON)</button>' +
      '<button type="button" class="btn btn-secondary btn-block" id="btnReset" style="margin-top:16px;color:#b91c1c;border-color:#fecaca">Reset all data</button>' +
      "</div>";

    document.getElementById("btnExport").onclick = function () {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      const d = new Date();
      const stamp = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
      a.download = "habit-journal-backup-" + stamp + ".json";
      a.click();
      URL.revokeObjectURL(a.href);
      try {
        localStorage.setItem("habit-journal-last-export", String(Date.now()));
      } catch (e) { /* ok */ }
      toast("Backup saved — keep the file somewhere safe");
    };

    document.getElementById("btnImport").onclick = function () {
      document.getElementById("importInput").click();
    };

    document.getElementById("btnReset").onclick = function () {
      if (!confirm("Erase all habits and marks? This cannot be undone.")) return;
      if (!confirm("Really delete everything? Export first if you want a backup.")) return;
      clearAllStorage();
      state = defaultState();
      save();
      render();
      toast("Reset complete");
    };
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  document.getElementById("importInput").addEventListener("change", function (e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function () {
      try {
        let p = JSON.parse(reader.result);
        if (typeof AppsBackup !== "undefined" && AppsBackup.isUnifiedBackup(p)) {
          p = AppsBackup.getAppSlice(p, "habit-journal");
          if (!p) {
            toast("No Habit Journal data in this file");
            return;
          }
        }
        if (!p || !Array.isArray(p.habits)) throw new Error("Invalid");
        if (!confirm("Replace all current data with this file?")) return;
        const merged = {
          version: 2,
          year: typeof p.year === "number" ? p.year : new Date().getFullYear(),
          month: typeof p.month === "number" ? p.month : new Date().getMonth(),
          habits: p.habits,
          cells: p.cells || {},
          categories: Array.isArray(p.categories) && p.categories.length ? p.categories : cloneDefaultCategories(),
          categoryFilter: typeof p.categoryFilter === "string" ? p.categoryFilter : "all",
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
        state = loadState();
        save();
        render();
        toast("Import complete");
      } catch (err) {
        toast("Invalid JSON file");
      }
    };
    reader.readAsText(file);
  });

  const panelIds = { month: "panelMonth", year: "panelYear", habits: "panelHabits", data: "panelData" };

  document.addEventListener("click", function (e) {
    const btn = e.target.closest("[data-mode-action]");
    if (!btn) return;
    setEraserMode(btn.getAttribute("data-mode-action") === "eraser");
    render();
  });

  document.getElementById("yearFsClose").addEventListener("click", closeYearFullscreen);
  document.getElementById("yearFullscreen").addEventListener("click", function (e) {
    if (e.target.id === "yearFullscreen") closeYearFullscreen();
  });

  document.querySelectorAll(".tab").forEach(function (tab) {
    tab.onclick = function () {
      if (tab.dataset.tab !== "year") closeYearFullscreen();
      activeTab = tab.dataset.tab;
      document.querySelectorAll(".tab").forEach(function (t) { t.classList.toggle("on", t === tab); });
      document.querySelectorAll(".panel").forEach(function (p) { p.classList.remove("on"); });
      document.getElementById(panelIds[activeTab]).classList.add("on");
      render();
    };
  });

  function render() {
    try {
      ensureHabitsReady();
      document.body.classList.toggle("eraser-mode", eraserMode && (activeTab === "month" || activeTab === "year"));
      updateModeBar();
      renderTopNav();
      if (activeTab === "month") renderMonth();
      else if (activeTab === "year") {
        renderYear();
        if (yearFullscreenHabitId) {
          openYearFullscreen(yearFullscreenHabitId);
        }
      }
      else if (activeTab === "habits") renderHabits();
      else if (activeTab === "data") renderData();
    } catch (err) {
      console.error("Habit Journal render error:", err);
      showFatalError("Could not display habits. Open the Data tab, tap Reset, then reload. If it persists, clear Safari website data for mathoose.github.io.");
    }
  }

  storageOk = storageAvailable();
  if (!storageOk) {
    showStorageBanner("Data won't save in Private Browsing. Use Safari normal mode and always open the same URL (mathoose.github.io).");
  } else if ("storage" in navigator && navigator.storage && navigator.storage.persist) {
    navigator.storage.persist().catch(function () {});
  }

  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "hidden") flushSave();
  });
  window.addEventListener("pagehide", flushSave);

  try {
    render();
    if (window.__hjRecoveredFrom) {
      toast("Restored your data from automatic backup");
      window.__hjRecoveredFrom = null;
    }
    if (storageOk && Object.keys(state.cells).length > 0) {
      try {
        const lastExport = parseInt(localStorage.getItem("habit-journal-last-export"), 10);
        const lastTip = parseInt(localStorage.getItem("habit-journal-export-tip"), 10);
        if ((!lastExport || Date.now() - lastExport > 14 * 86400000) && (!lastTip || Date.now() - lastTip > 7 * 86400000)) {
          localStorage.setItem("habit-journal-export-tip", String(Date.now()));
          setTimeout(function () {
            toast("Tip: Data tab → Export backup for an extra copy");
          }, 1200);
        }
      } catch (e) { /* ok */ }
    }
  } catch (err) {
    console.error("Habit Journal startup error:", err);
    showFatalError("Could not start Habit Journal. Open the Data tab, tap Reset, then reload the page.");
  }
})();
  </script>
  <script src="../apps-backup.js"></script>
  <script src="../apps-shell.js" defer></script>
</body>
</html>
