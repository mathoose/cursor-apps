<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>World Cup 2026 — Matches</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="WC 2026" />
  <meta name="theme-color" content="#0a1628" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <!-- build: wc-bracket-v1 -->
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="../apps-shell.css" />
  <link rel="stylesheet" href="styles.css?v=wc-bracket1" />
</head>
<body>
  <header class="top">
    <div class="top-row topbar-with-home">
      <a href="https://mathoose.github.io/cursor-apps/" class="apps-home-back" data-apps-home aria-label="Back to Apps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <div class="top-titles">
        <h1>World Cup 2026</h1>
        <p class="sub">Tap any match to enter score · times in ET</p>
      </div>
    </div>
    <nav class="nav-tabs" aria-label="Views">
      <a class="nav-tab on" href="index.html?v=wc-bracket1" aria-current="page">Matches</a>
      <a class="nav-tab" href="table.html?v=wc-bracket1">Tables</a>
      <a class="nav-tab" href="bracket.html?v=wc-bracket1">Bracket</a>
    </nav>
    <div class="filters">
      <input type="search" id="search" placeholder="Search team or venue…" autocomplete="off" />
      <select id="filter-group" aria-label="Filter by group">
        <option value="">All groups</option>
      </select>
      <select id="filter-matchday" aria-label="Filter by matchday">
        <option value="">All matchdays</option>
        <option value="1">Matchday 1</option>
        <option value="2">Matchday 2</option>
        <option value="3">Matchday 3</option>
      </select>
    </div>
  </header>

  <div class="stats-bar">
    <span id="progress">0 / 72 results entered</span>
    <button type="button" id="clear-scores">Clear all scores</button>
  </div>

  <main id="matches"></main>

  <div class="modal-backdrop" id="score-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <div>
          <h2 id="modal-title">Enter result</h2>
          <p class="modal-sub" id="modal-meta"></p>
        </div>
        <button type="button" class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-teams" id="modal-teams"></div>
        <div class="modal-scores">
          <label class="modal-score-label">
            <span id="modal-home-name"></span>
            <input class="score-input modal-score-input" id="modal-home" type="number" min="0" max="20" inputmode="numeric" placeholder="0" />
          </label>
          <span class="score-sep">–</span>
          <label class="modal-score-label">
            <span id="modal-away-name"></span>
            <input class="score-input modal-score-input" id="modal-away" type="number" min="0" max="20" inputmode="numeric" placeholder="0" />
          </label>
        </div>
        <label class="modal-note-label">
          Notes <span class="optional">(optional)</span>
          <textarea id="modal-note" rows="3" placeholder="Goal scorers, thoughts, where you watched…"></textarea>
        </label>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" id="modal-clear">Remove score</button>
        <button type="button" class="btn btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <script src="matches.js?v=wc-bracket1"></script>
  <script src="core.js?v=wc-bracket1"></script>
  <script src="matches-page.js?v=wc-bracket1"></script>
  <script src="../apps-shell.js" defer></script>
</body>
</html>
