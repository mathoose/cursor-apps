<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>World Cup 2026 — Bracket</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="WC 2026" />
  <meta name="theme-color" content="#0a1628" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <!-- build: wc-tree-v6 -->
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="../apps-shell.css" />
  <link rel="stylesheet" href="styles.css?v=wc-tree6" />
</head>
<body>
  <header class="top">
    <div class="top-row topbar-with-home">
      <a href="https://mathoose.github.io/cursor-apps/" class="apps-home-back" data-apps-home aria-label="Back to Apps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <div class="top-titles">
        <h1>Knockout Bracket</h1>
        <p class="sub">FIFA Annex C · updates from group scores</p>
      </div>
    </div>
    <nav class="nav-tabs" aria-label="Views">
      <a class="nav-tab" href="index.html?v=wc-tree6">Matches</a>
      <a class="nav-tab" href="table.html?v=wc-tree6">Tables</a>
      <a class="nav-tab on" href="bracket.html?v=wc-tree6" aria-current="page">Bracket</a>
    </nav>
  </header>

  <div class="stats-bar">
    <span id="scenario-info">Loading bracket…</span>
    <button type="button" id="clear-bracket">Reset picks</button>
  </div>

  <div class="bracket-view-toggle" role="tablist" aria-label="Bracket view">
    <button type="button" class="view-btn on" id="view-tree" data-view="tree">Tree</button>
    <button type="button" class="view-btn" id="view-list" data-view="list">Match list</button>
  </div>

  <main id="bracket-main"></main>

  <div class="modal-backdrop" id="score-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <div>
          <h2 id="modal-title">Enter result</h2>
          <p class="modal-sub" id="modal-meta"></p>
        </div>
        <button type="button" class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <p class="modal-period-label">90 minutes</p>
        <div class="modal-scores">
          <label class="modal-score-label">
            <span id="modal-home-name"></span>
            <input class="score-input modal-score-input" id="modal-home" type="number" min="0" max="20" inputmode="numeric" placeholder="0" />
          </label>
          <span class="score-sep">–</span>
          <label class="modal-score-label">
            <span id="modal-away-name"></span>
            <input class="score-input modal-score-input" id="modal-away" type="number" min="0" max="20" inputmode="numeric" placeholder="0" />
          </label>
        </div>

        <div class="modal-draw-options" id="modal-draw-options" hidden>
          <p class="modal-draw-hint">Draw after 90 — how was it decided?</p>
          <label class="modal-check">
            <input type="checkbox" id="modal-aet-toggle" />
            <span>Extra time</span>
          </label>
          <div class="modal-extra-block" id="modal-aet-block" hidden>
            <p class="modal-period-label">After extra time</p>
            <div class="modal-scores modal-scores-compact">
              <label class="modal-score-label">
                <span id="modal-aet-home-name"></span>
                <input class="score-input modal-score-input modal-score-input-sm" id="modal-aet-home" type="number" min="0" max="20" inputmode="numeric" placeholder="0" />
              </label>
              <span class="score-sep">–</span>
              <label class="modal-score-label">
                <span id="modal-aet-away-name"></span>
                <input class="score-input modal-score-input modal-score-input-sm" id="modal-aet-away" type="number" min="0" max="20" inputmode="numeric" placeholder="0" />
              </label>
            </div>
          </div>
          <label class="modal-check">
            <input type="checkbox" id="modal-pen-toggle" />
            <span>Penalties</span>
          </label>
          <div class="modal-extra-block" id="modal-pen-block" hidden>
            <p class="modal-period-label">Penalty shootout</p>
            <div class="modal-scores modal-scores-compact">
              <label class="modal-score-label">
                <span id="modal-pen-home-name"></span>
                <input class="score-input modal-score-input modal-score-input-sm" id="modal-pen-home" type="number" min="0" max="20" inputmode="numeric" placeholder="0" />
              </label>
              <span class="score-sep">–</span>
              <label class="modal-score-label">
                <span id="modal-pen-away-name"></span>
                <input class="score-input modal-score-input modal-score-input-sm" id="modal-pen-away" type="number" min="0" max="20" inputmode="numeric" placeholder="0" />
              </label>
            </div>
          </div>
        </div>

        <label class="modal-note-label">
          Notes <span class="optional">(optional)</span>
          <textarea id="modal-note" rows="3" placeholder="Goal scorers, thoughts…"></textarea>
        </label>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" id="modal-clear">Remove score</button>
        <button type="button" class="btn btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <script src="matches.js?v=wc-tree6"></script>
  <script src="bracket-scenarios.js?v=wc-tree6"></script>
  <script src="bracket-structure.js?v=wc-tree6"></script>
  <script src="bracket-tree-layout.js?v=wc-tree6"></script>
  <script src="core.js?v=wc-tree6"></script>
  <script src="bracket.js?v=wc-tree6"></script>
  <script src="bracket-page.js?v=wc-tree6"></script>
  <script src="../apps-shell.js" defer></script>
</body>
</html>
