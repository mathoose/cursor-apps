<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>World Cup 2026 — Tables</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="WC 2026" />
  <meta name="theme-color" content="#0a1628" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <!-- build: wc-tree-v1 -->
  <link rel="icon" href="app-icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="app-icon.png" />
  <link rel="stylesheet" href="../apps-shell.css" />
  <link rel="stylesheet" href="styles.css?v=wc-tree2" />
</head>
<body>
  <header class="top">
    <div class="top-row topbar-with-home">
      <a href="https://mathoose.github.io/cursor-apps/" class="apps-home-back" data-apps-home aria-label="Back to Apps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <div class="top-titles">
        <h1>Group Tables</h1>
        <p class="sub">32 of 48 advance · top 2 + best 8 third</p>
      </div>
    </div>
    <nav class="nav-tabs" aria-label="Views">
      <a class="nav-tab" href="index.html?v=wc-tree2">Matches</a>
      <a class="nav-tab on" href="table.html?v=wc-tree2" aria-current="page">Tables</a>
      <a class="nav-tab" href="bracket.html?v=wc-tree2">Bracket</a>
    </nav>
  </header>

  <div class="stats-bar">
    <span id="progress">0 / 72 results entered</span>
    <span id="updated">Updates as you enter scores</span>
  </div>

  <main>
    <div class="groups-grid" id="groups"></div>
    <div id="third-place"></div>
    <div class="legend">
      <span><span class="swatch qualify"></span> Top 2 (auto qualify)</span>
      <span><span class="swatch wildcard"></span> 3rd (wildcard race)</span>
      <span><span class="swatch out"></span> Out</span>
    </div>
  </main>

  <div class="modal-backdrop team-modal-backdrop" id="team-modal" hidden>
    <div class="modal team-modal" role="dialog" aria-modal="true" aria-labelledby="team-modal-title">
      <div class="modal-header">
        <div>
          <h2 id="team-modal-title" class="team-modal-title"></h2>
          <p class="modal-sub" id="team-modal-meta"></p>
        </div>
        <button type="button" class="modal-close" id="team-modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body team-modal-body">
        <h3 class="team-section-label">Fixtures</h3>
        <ul class="team-match-list" id="team-modal-matches"></ul>
        <h3 class="team-section-label">Group standing</h3>
        <div id="team-modal-status"></div>
      </div>
    </div>
  </div>

  <script src="matches.js?v=wc-tree2"></script>
  <script src="core.js?v=wc-tree2"></script>
  <script src="team-modal.js?v=wc-tree2"></script>
  <script src="table-page.js?v=wc-tree2"></script>
  <script src="../apps-shell.js" defer></script>
</body>
</html>
