<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Media Shelf</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Media Shelf" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1625" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="../apps-shell.css" />
  <style>
    :root {
      --bg: #0f0d14;
      --surface: #1a1625;
      --surface-2: #242030;
      --border: #2e2840;
      --text: #f4f0ff;
      --text-muted: #a89ec4;
      --text-faint: #6b6080;
      --accent: #7c6cf0;
      --accent-soft: rgba(124, 108, 240, 0.15);
      --accent-dark: #9588f5;
      --pink: #e85d75;
      --gold: #f5a623;
      --teal: #2dd4bf;
      --success: #4ade80;
      --danger: #f87171;
      --radius: 14px;
      --nav-h: calc(62px + env(safe-area-inset-bottom));
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.45;
      overscroll-behavior-y: contain;
    }
    body { min-height: 100dvh; padding-bottom: var(--nav-h); }
    button, input, select, textarea { font: inherit; color: inherit; }
    input, select, textarea {
      -webkit-appearance: none;
      appearance: none;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: linear-gradient(180deg, var(--bg) 85%, transparent);
      padding: max(10px, env(safe-area-inset-top)) 14px 10px;
    }
    .header-row { display: flex; align-items: center; gap: 8px; }
    .app-header .apps-home-back {
      background: var(--accent-soft);
      color: var(--accent-dark);
    }
    .header-title { flex: 1; min-width: 0; }
    .header-title h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header-title p {
      margin: 2px 0 0;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .icon-btn[hidden] { display: none; }
    .icon-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    main { padding: 0 14px 20px; max-width: 640px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
    }
    .toolbar input { flex: 1; }
    .toolbar select { width: auto; min-width: 96px; flex-shrink: 0; }
    .toolbar-count { font-size: 0.82rem; color: var(--text-faint); white-space: nowrap; }

    .search-box { display: flex; gap: 8px; margin-bottom: 10px; }
    .search-box input { flex: 1; font-size: 1.05rem; padding: 12px 14px; }
    .filter-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .filter-row select { flex: 1; padding: 8px 10px; font-size: 0.9rem; }
    .parsed-hint {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 0 0 12px 4px;
    }
    .parsed-hint strong { color: var(--accent-dark); }
    .search-section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-faint);
      margin: 16px 0 8px;
    }

    .track-card {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      color: inherit;
    }
    .track-card:active { border-color: var(--accent); }
    .track-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }
    .track-card-top strong { font-size: 1rem; }
    .track-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .track-extra { font-size: 0.75rem; color: var(--text-faint); }
    .track-when {
      margin: 0 0 4px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .track-when time { color: var(--teal); font-weight: 600; }
    .track-preview {
      margin: 0;
      font-size: 0.88rem;
      color: var(--text-faint);
      line-height: 1.4;
    }

    .badge {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 3px 8px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .badge-show { background: rgba(45, 212, 191, 0.15); color: var(--teal); }
    .badge-manga { background: rgba(232, 93, 117, 0.15); color: var(--pink); }
    .badge-have { background: rgba(74, 222, 128, 0.15); color: var(--success); }
    .badge-wishlist { background: rgba(245, 166, 35, 0.15); color: var(--gold); }
    .badge-reading { background: var(--accent-soft); color: var(--accent-dark); }
    .badge-format { background: var(--surface-2); color: var(--text-muted); }

    .log-list { list-style: none; margin: 0; padding: 0; }
    .log-entry {
      background: var(--surface-2);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      position: relative;
    }
    .log-time {
      display: block;
      font-size: 0.75rem;
      color: var(--teal);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .log-text { margin: 0 0 8px; font-size: 0.92rem; white-space: pre-wrap; }
    .log-delete { margin: 0; }
    .log-form label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .log-form textarea { min-height: 72px; resize: vertical; }

    .detail-section { margin-bottom: 18px; }
    .detail-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-faint);
      margin: 0 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .detail-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .detail-last { font-size: 0.88rem; color: var(--text-muted); }

    .vol-pills-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .vol-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      color: var(--text);
    }
    .pill-vol { font-weight: 700; color: var(--pink); }
    .pill-fmt { font-size: 0.68rem; color: var(--text-faint); }
    .pill-want { font-size: 0.65rem; color: var(--gold); font-weight: 700; text-transform: uppercase; }

    .vol-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 10px;
    }
    .vol-card-top { display: flex; justify-content: space-between; gap: 8px; }
    .vol-num { font-size: 0.85rem; color: var(--pink); font-weight: 600; }
    .vol-filename {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 0.82rem;
      color: var(--accent-dark);
      word-break: break-all;
      margin: 8px 0 0;
    }
    .hints-block { margin-top: 12px; }
    .hints-label { font-size: 0.75rem; color: var(--text-faint); margin: 0 0 6px; }
    .hints-list { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: 6px; }
    .hint-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text);
    }
    .vol-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .detail-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost { background: transparent; color: var(--text-muted); padding: 6px 10px; }
    .btn-ghost.danger { color: var(--danger); }
    .btn-sm { font-size: 0.82rem; padding: 7px 12px; }
    .btn-block { width: 100%; margin-bottom: 8px; }
    .btn:active { opacity: 0.85; }

    .empty-state { text-align: center; padding: 32px 16px; color: var(--text-muted); }
    .empty-state p { margin: 0 0 8px; }
    .hint { font-size: 0.88rem; color: var(--text-faint); }
    .hint em { color: var(--text-muted); font-style: normal; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .card h2 { margin: 0 0 6px; font-size: 1rem; }
    textarea.bulk { min-height: 120px; font-family: ui-monospace, Menlo, monospace; font-size: 0.85rem; resize: vertical; }
    .bulk-result { font-size: 0.85rem; color: var(--success); margin-top: 8px; }

    .lookup-card {
      display: flex;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 10px;
    }
    .lookup-cover { width: 56px; height: 80px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
    .lookup-cover.placeholder { background: var(--surface-2); }
    .lookup-info { flex: 1; min-width: 0; }
    .lookup-meta { font-size: 0.78rem; color: var(--text-faint); display: block; margin-top: 4px; }
    .loading { color: var(--text-muted); text-align: center; padding: 20px; }

    .form-overlay, .detail-overlay, .add-menu-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .form-overlay[hidden], .detail-overlay[hidden], .add-menu-overlay[hidden] { display: none; }
    .form-sheet, .detail-sheet, .add-menu-sheet {
      background: var(--surface);
      border-radius: 18px 18px 0 0;
      width: 100%;
      max-width: 640px;
      max-height: 92dvh;
      overflow-y: auto;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .sheet-header h2 { margin: 0; font-size: 1.1rem; }
    .form-grid { display: grid; gap: 10px; }
    .form-grid label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-actions { display: flex; gap: 8px; margin-top: 14px; }
    .form-actions .btn { flex: 1; }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 40;
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 4px 6px;
      border: none;
      background: transparent;
      color: var(--text-faint);
      font-size: 0.68rem;
      font-weight: 600;
      cursor: pointer;
    }
    .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }
    .nav-btn.active { color: var(--accent-dark); }

    .fab {
      position: fixed;
      right: 16px;
      bottom: calc(var(--nav-h) + 12px);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--pink));
      color: #fff;
      font-size: 1.6rem;
      line-height: 1;
      box-shadow: 0 4px 20px rgba(124, 108, 240, 0.4);
      cursor: pointer;
      z-index: 35;
    }
    .fab[hidden] { display: none; }

    #toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--nav-h) + 16px);
      transform: translateX(-50%) translateY(12px);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 60;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .backup-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .import-label { cursor: pointer; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-row">
      <a href="https://mathoose.github.io/cursor-apps/" class="apps-home-back" data-apps-home aria-label="Back to Apps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <div class="header-title">
        <h1 id="header-title-text">Track</h1>
        <p id="header-subtitle">Shows &amp; manga</p>
      </div>
      <button type="button" class="icon-btn" id="header-add" aria-label="Add">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
  </header>

  <main>
    <section class="view active" data-view="track">
      <div class="toolbar">
        <input type="search" id="track-filter" placeholder="Filter titles…" autocomplete="off" />
        <select id="track-kind" aria-label="Type">
          <option value="">All</option>
          <option value="show">Shows</option>
          <option value="manga">Manga</option>
        </select>
        <span class="toolbar-count" id="track-count">0 titles</span>
      </div>
      <div id="track-list"></div>
    </section>

    <section class="view" data-view="search">
      <div class="search-box">
        <input type="search" id="search-input" placeholder="Title, volume, or note…" autocomplete="off" enterkeyhint="search" />
      </div>
      <div class="filter-row">
        <select id="search-status" aria-label="Manga file status">
          <option value="">All manga files</option>
          <option value="have">Have</option>
          <option value="wishlist">Want</option>
          <option value="reading">Reading</option>
        </select>
      </div>
      <p class="parsed-hint" id="search-parsed" hidden></p>
      <div id="search-results"></div>
    </section>

    <section class="view" data-view="more">
      <div class="card">
        <h2>Import manga filenames</h2>
        <p class="hint">One filename per line — groups into manga series automatically.</p>
        <textarea class="bulk" id="bulk-input" placeholder="One Piece - Vol 01.pdf&#10;Spy x Family v05.cbz"></textarea>
        <button type="button" class="btn btn-primary" id="bulk-import-btn" style="margin-top:10px">Import</button>
        <p class="bulk-result" id="bulk-result"></p>
      </div>
      <div class="card">
        <h2>Lookup manga</h2>
        <div class="search-box">
          <input type="search" id="lookup-input" placeholder="AniList search…" autocomplete="off" />
          <button type="button" class="btn btn-primary" id="lookup-btn">Go</button>
        </div>
        <div id="lookup-results"></div>
      </div>
      <div class="card">
        <h2>Backup</h2>
        <div class="backup-actions">
          <button type="button" class="btn btn-secondary" id="export-btn">Export JSON</button>
          <label class="btn btn-secondary import-label">
            Import JSON
            <input type="file" id="import-file" accept="application/json,.json" hidden />
          </label>
        </div>
      </div>
    </section>
  </main>

  <button type="button" class="fab" id="fab-add" aria-label="Add">+</button>

  <nav class="bottom-nav" aria-label="Main">
    <button type="button" class="nav-btn active" data-nav="track">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      Track
    </button>
    <button type="button" class="nav-btn" data-nav="search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>
      Search
    </button>
    <button type="button" class="nav-btn" data-nav="more">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      More
    </button>
  </nav>

  <div id="toast"></div>

  <div class="add-menu-overlay" id="add-menu-overlay" hidden>
    <div class="add-menu-sheet">
      <div class="sheet-header">
        <h2>Add</h2>
        <button type="button" class="btn btn-ghost" id="add-menu-cancel">Cancel</button>
      </div>
      <button type="button" class="btn btn-primary btn-block" id="add-show-btn">TV show</button>
      <button type="button" class="btn btn-secondary btn-block" id="add-manga-btn">Manga series</button>
    </div>
  </div>

  <div class="form-overlay" id="item-form-overlay" hidden>
    <div class="form-sheet">
      <div class="sheet-header">
        <h2 id="item-form-title">Add show or manga</h2>
        <button type="button" class="btn btn-ghost" id="item-form-cancel">Cancel</button>
      </div>
      <form id="item-form">
        <input type="hidden" id="item-form-id" />
        <div class="form-grid">
          <label>Title
            <input type="text" id="item-form-title-input" required placeholder="Attack on Titan" autocomplete="off" />
          </label>
          <label>Type
            <select id="item-form-kind">
              <option value="show">TV show</option>
              <option value="manga">Manga</option>
            </select>
          </label>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="form-overlay" id="form-overlay" hidden>
    <div class="form-sheet">
      <div class="sheet-header">
        <h2 id="form-title">Add volume</h2>
        <button type="button" class="btn btn-ghost" id="form-cancel">Cancel</button>
      </div>
      <form id="volume-form">
        <input type="hidden" id="form-item-id" />
        <input type="hidden" id="form-vol-id" />
        <div class="form-grid">
          <div class="form-row">
            <label>Volume #
              <input type="number" id="form-volume" required min="1" inputmode="numeric" />
            </label>
            <label>Format
              <select id="form-format">
                <option value="pdf">PDF</option>
                <option value="epub">EPUB</option>
                <option value="cbz">CBZ</option>
                <option value="cbr">CBR</option>
                <option value="mobi">MOBI</option>
              </select>
            </label>
          </div>
          <label>Filename on device
            <input type="text" id="form-filename" autocomplete="off" />
          </label>
          <label>Folder path
            <input type="text" id="form-path" autocomplete="off" />
          </label>
          <label>Status
            <select id="form-status">
              <option value="have">Have</option>
              <option value="wishlist">Want</option>
              <option value="reading">Reading</option>
            </select>
          </label>
          <label>Notes
            <input type="text" id="form-notes" autocomplete="off" />
          </label>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="detail-overlay" id="detail-overlay" hidden>
    <div class="detail-sheet">
      <div class="sheet-header">
        <h2 id="detail-title">Details</h2>
        <button type="button" class="btn btn-ghost" id="detail-close">Close</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>

  <script src="../apps-backup.js"></script>
  <script src="../apps-shell.js" defer></script>
  <script src="app.js"></script>
</body>
</html>
