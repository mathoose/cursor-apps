# Static site — no build step. Publish repo root (same tree as GitHub Pages).
# voice-notes/ was removed; do not point Netlify at that folder.
# Large rep-tracker assets are listed in .netlifyignore (Netlify CDN ~10 MB/file cap).
[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
