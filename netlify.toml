# Netlify deploy for cursor-apps (legacy site: voice-notes-mattheus).
# Stage monorepo into voice-notes/dist — see voice-notes/build-netlify.sh.
[build]
  command = "bash voice-notes/build-netlify.sh"
  publish = "voice-notes/dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
